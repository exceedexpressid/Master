                                                                                        }, {});

                                                                                        return Object.keys(groupedByOlshop).sort().map((oName, oIdx) => {
                                                                                            const innerId = `${kur.name}_${oName}`;
                                                                                            const isInnerExpanded = expandedKurirOlshops.includes(innerId);

                                                                                            let oCash = 0, oTfOlshop = 0, oTfKantor = 0, oMinusOngkir = 0, oWajibSetor = 0, oTambahan = 0;
                                                                                            groupedByOlshop[oName].forEach(pkg => {
                                                                                                if(String(pkg.status).toLowerCase() === 'sukses') {
                                                                                                    const { hBarang, oDasar, oTambahan: oTamb, oTotal } = getFinancials(pkg);
                                                                                                    const metode = String(pkg.metodeBayar).trim().toUpperCase();
                                                                                                    
                                                                                                    oTambahan += oTamb; 
                                                                                                    
                                                                                                    if (metode === 'TF OLSHOP') { oTfOlshop += hBarang; oMinusOngkir += oTotal; oWajibSetor -= oTamb; }
                                                                                                    else if (metode === 'TF KANTOR') { oTfKantor += hBarang; oMinusOngkir += oTotal; oWajibSetor -= oTamb;}
                                                                                                    else if (metode === 'CASH' || metode === 'COD') { oCash += (hBarang + oTotal); oWajibSetor += (hBarang + oDasar); }
                                                                                                }
                                                                                            });

                                                                                            return (
                                                                                                <div key={oIdx} className="bg-slate-800/40 rounded-xl border border-slate-700/50 overflow-hidden shadow-sm">
                                                                                                    <div 
                                                                                                        className="flex items-center justify-between p-3 md:p-4 cursor-pointer hover:bg-slate-700/40 transition-colors"
                                                                                                        onClick={(e) => { e.stopPropagation(); toggleKurirOlshop(innerId); }}
                                                                                                    >
                                                                                                        <div className="flex items-center w-1/4 min-w-[150px]">
                                                                                                            <div className={`w-5 h-5 rounded-full flex items-center justify-center mr-3 transition-colors flex-shrink-0 ${isInnerExpanded ? 'bg-[#e65c00] text-white' : 'bg-slate-700 text-slate-400 group-hover:text-[#e65c00]'}`}>
                                                                                                                <i className={`fas fa-chevron-${isInnerExpanded ? 'up' : 'down'} text-[10px]`}></i>
                                                                                                            </div>
                                                                                                            <i className="fas fa-store text-[#e65c00] mr-2 text-[10px] md:text-xs"></i>
                                                                                                            <h5 className="font-bold text-slate-200 text-xs md:text-sm uppercase truncate">{oName}</h5>
                                                                                                            <span className="ml-2 text-[9px] bg-slate-700 text-slate-300 px-2 py-0.5 rounded-md font-bold shrink-0">{groupedByOlshop[oName].length} Pkt</span>
                                                                                                        </div>
                                                                                                        
                                                                                                        <div className="flex-1 flex justify-end items-center space-x-2.5 md:space-x-6 overflow-x-auto scrollbar-hide">
                                                                                                            <div className="text-right min-w-[65px]">
                                                                                                                <div className="text-[8px] text-emerald-500/70 uppercase font-bold tracking-wider mb-0.5">Cash</div>
                                                                                                                <div className="text-[10px] md:text-xs font-bold text-emerald-400">+{formatCurrency(oCash)}</div>
                                                                                                            </div>
                                                                                                            <div className="text-right min-w-[65px]">
                                                                                                                <div className="text-[8px] text-blue-500/70 uppercase font-bold tracking-wider mb-0.5">TF Olshop</div>
                                                                                                                <div className="text-[10px] md:text-xs font-bold text-blue-400">{formatCurrency(oTfOlshop)}</div>
                                                                                                            </div>
                                                                                                            <div className="text-right min-w-[65px]">
                                                                                                                <div className="text-[8px] text-purple-500/70 uppercase font-bold tracking-wider mb-0.5">TF Kantor</div>
                                                                                                                <div className="text-[10px] md:text-xs font-bold text-purple-400">{formatCurrency(oTfKantor)}</div>
                                                                                                            </div>
                                                                                                            <div className="text-right min-w-[65px]">
                                                                                                                <div className="text-[8px] text-red-500/70 uppercase font-bold tracking-wider mb-0.5">Min Ongkir</div>
                                                                                                                <div className="text-[10px] md:text-xs font-bold text-red-400">-{formatCurrency(oMinusOngkir)}</div>
                                                                                                            </div>
                                                                                                            <div className="text-right min-w-[65px]">
                                                                                                                <div className="text-[8px] text-orange-500/70 uppercase font-bold tracking-wider mb-0.5">Ongkir Tambahan</div>
                                                                                                                <div className="text-[10px] md:text-xs font-bold text-orange-400">+{formatCurrency(oTambahan)}</div>
                                                                                                            </div>
                                                                                                            <div className="text-right min-w-[75px] pl-2 md:pl-3 border-l border-slate-700/50">
                                                                                                                <div className="text-[8px] text-slate-400 uppercase font-bold tracking-wider mb-0.5">Wajib Setor</div>
                                                                                                                <div className="text-[11px] md:text-sm font-black text-emerald-500">{formatCurrency(oWajibSetor)}</div>
                                                                                                            </div>
                                                                                                        </div>
                                                                                                    </div>
                                                                                                    
                                                                                                    {/* RINCIAN PAKET (ACCORDION DIBUKA) */}
                                                                                                    {isInnerExpanded && (
                                                                                                        <div className="p-3 md:p-4 pt-0 border-t border-slate-700/50 animate-fade-in-down">
                                                                                                            <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-3 mt-3">
                                                                                                                {groupedByOlshop[oName].map((pkg, pIdx) => {
                                                                                                                    const { hBarang, tagihan, oDasar, oTambahan } = getFinancials(pkg);
                                                                                                                    const isCair = String(pkg.statusPencairan).toLowerCase() === 'cair';
                                                                                                                    const isSukses = String(pkg.status).toLowerCase() === 'sukses';
                                                                                                                    let displayTgl = String(pkg.dateString || pkg.tanggal || '-');
                                                                                                                    if (displayTgl !== '-' && displayTgl.includes('T')) displayTgl = displayTgl.split('T')[0];

                                                                                                                    return (
                                                                                                                        <div key={pIdx} className="bg-[#1e293b] border border-slate-600/50 rounded-xl p-3 flex flex-col relative shadow-sm hover:border-slate-500 transition-colors">
                                                                                                                            <div className="flex justify-between items-start border-b border-slate-700/50 pb-2 mb-2">
                                                                                                                                <div className="flex-1 pr-2">
                                                                                                                                    <div className="flex items-center space-x-2">
                                                                                                                                        <div className="text-[#e65c00] font-mono text-[10px] md:text-xs font-bold bg-orange-900/20 px-1.5 py-0.5 rounded border border-orange-800/30 inline-block">{pkg.packageId}</div>
                                                                                                                                        <StatusBadgeAdmin status={pkg.status} />
                                                                                                                                    </div>
                                                                                                                                    <div className="text-slate-200 font-bold text-xs md:text-sm mt-1.5 truncate">{pkg.customerName}</div>
                                                                                                                                    <div className="text-slate-400 text-[10px] md:text-xs flex items-center mt-0.5"><i className="fas fa-phone mr-1.5 text-slate-500"></i> {pkg.customerPhone}</div>
                                                                                                                                </div>
                                                                                                                                
                                                                                                                                <div className="flex-shrink-0 flex flex-col items-end">
                                                                                                                                    {pkg.fotoBukti ? (
                                                                                                                                        <div 
                                                                                                                                            className="w-12 h-12 md:w-14 md:h-14 rounded-lg bg-slate-800 border border-slate-600 overflow-hidden cursor-pointer hover:opacity-80 transition-opacity relative group"
                                                                                                                                            onClick={(e) => { e.stopPropagation(); setSelectedImage(`https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(pkg.fotoBukti)}`); }}
                                                                                                                                        >
                                                                                                                                            <img src={`https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(pkg.fotoBukti)}`} className="w-full h-full object-cover" />
                                                                                                                                            <div className="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><i className="fas fa-search-plus text-white text-xs"></i></div>
                                                                                                                                        </div>
                                                                                                                                    ) : (
                                                                                                                                        <div className="w-12 h-12 md:w-14 md:h-14 rounded-lg bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-500"><i className="fas fa-image"></i></div>
                                                                                                                                    )}
                                                                                                                                    {isSukses && (
                                                                                                                                        <span className={`mt-1.5 text-[8px] font-bold px-1.5 py-0.5 rounded border ${isCair ? 'bg-emerald-900/30 text-emerald-400 border-emerald-800/50' : 'bg-orange-900/30 text-orange-400 border-orange-800/50'}`}>
                                                                                                                                            {isCair ? 'TELAH CAIR' : 'BELUM CAIR'}
                                                                                                                                        </span>
                                                                                                                                    )}
                                                                                                                                </div>
                                                                                                                            </div>
                                                                                                                            
                                                                                                                            <div className="space-y-1.5 text-[10px] md:text-xs mb-3">
                                                                                                                                <div className="flex items-start">
                                                                                                                                    <i className="fas fa-map-marker-alt text-slate-500 mt-0.5 mr-2 w-3 text-center"></i>
                                                                                                                                    <span className="text-slate-300 line-clamp-2">{pkg.address || '-'}</span>
                                                                                                                                </div>
                                                                                                                            </div>
                                                                                                                            
                                                                                                                            <div className="mt-auto pt-2 border-t border-slate-700/50 grid grid-cols-2 gap-2 text-[10px] md:text-xs">
                                                                                                                                <div>
                                                                                                                                    <div className="text-slate-500">Metode Bayar</div>
                                                                                                                                    <div className="font-bold text-slate-200">{pkg.metodeBayar || '-'}</div>
                                                                                                                                </div>
                                                                                                                                <div className="text-right">
                                                                                                                                    <div className="text-slate-500">Total Tagihan</div>
                                                                                                                                    <div className="font-bold text-slate-100">{formatCurrency(tagihan)}</div>
                                                                                                                                </div>
                                                                                                                                <div>
                                                                                                                                    <div className="text-slate-500">Harga Paket</div>
                                                                                                                                    <div className={`font-bold ${isSukses ? 'text-emerald-400' : 'text-slate-400'}`}>{formatCurrency(hBarang)}</div>
                                                                                                                                </div>
                                                                                                                                <div className="text-right">
                                                                                                                                    <div className="text-slate-500">Ongkir Dasar</div>
                                                                                                                                    <div className={`font-bold ${isSukses ? 'text-red-400' : 'text-slate-400'}`}>{formatCurrency(oDasar)}</div>
                                                                                                                                </div>
                                                                                                                                <div className="col-span-2 text-right pt-1 border-t border-slate-700/30">
                                                                                                                                    <span className="text-slate-500 mr-1.5">Ongkir Tambahan:</span>
                                                                                                                                    <span className={`font-bold ${isSukses ? 'text-orange-400' : 'text-slate-400'}`}>{formatCurrency(oTambahan)}</span>
                                                                                                                                </div>
                                                                                                                            </div>
                                                                                                                            
                                                                                                                            {/* TOMBOL EDIT RESI DARI TAMPILAN KARTU */}
                                                                                                                            <div className="mt-3 pt-3 border-t border-slate-700/50 flex justify-end">
                                                                                                                                <button onClick={(e) => { e.stopPropagation(); openEditModal(pkg); }} className="bg-blue-900/40 border border-blue-700/50 text-blue-400 hover:bg-blue-600 hover:text-white px-3 py-1.5 rounded text-[10px] font-bold transition-colors flex items-center">
                                                                                                                                    <i className="fas fa-edit mr-1.5"></i> Edit Resi
                                                                                                                                </button>
                                                                                                                            </div>
                                                                                                                        </div>
                                                                                                                    );
                                                                                                                })}
                                                                                                            </div>
                                                                                                        </div>
                                                                                                    )}
                                                                                                </div>
                                                                                            );
                                                                                        });
                                                                                    })()}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            )}
                                                        </React.Fragment>
                                                    );
                                                })
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* TAMPILAN TAB 3: LAPORAN PROFIT */}
                        {activeTab === 'profit' && (
                            <div className="bg-[#1e293b] rounded-xl shadow-sm border border-slate-700 overflow-hidden">
                                <div className="p-3 md:p-4 border-b border-slate-700 bg-slate-800/50 flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                                    <div>
                                        <h3 className="font-bold text-slate-200 text-xs md:text-sm">Rincian Profit Bersih Perusahaan <span className="text-[10px] text-slate-400 font-normal ml-1">(Klik baris untuk rincian)</span></h3>
                                    </div>
                                    <div className="flex flex-col md:flex-row items-center gap-3 w-full md:w-auto">
                                        <div className="flex bg-slate-900 rounded-lg p-1 border border-slate-700 w-full md:w-auto">
                                            <button 
                                                onClick={() => setProfitViewBy('olshop')} 
                                                className={`flex-1 px-3 md:px-4 py-1.5 md:py-2 rounded-md text-[10px] md:text-xs font-bold transition-colors ${profitViewBy === 'olshop' ? 'bg-emerald-600 text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'}`}
                                            >
                                                Per Olshop
                                            </button>
                                            <button 
                                                onClick={() => setProfitViewBy('kurir')} 
                                                className={`flex-1 px-3 md:px-4 py-1.5 md:py-2 rounded-md text-[10px] md:text-xs font-bold transition-colors ${profitViewBy === 'kurir' ? 'bg-emerald-600 text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'}`}
                                            >
                                                Per Kurir
                                            </button>
                                        </div>
                                        <span className="text-[10px] md:text-xs font-bold bg-emerald-900/50 text-emerald-400 px-3 py-2 rounded-lg border border-emerald-800 w-full md:w-auto text-center whitespace-nowrap shadow-inner">
                                            Total Profit Bersih: {formatCurrency(globalSummary.totalProfit)}
                                        </span>
                                    </div>
                                </div>
                                
                                <div className="overflow-x-auto scrollbar-hide">
                                    <div className="min-w-[600px] flex flex-col">
                                        {(() => {
                                            const reportData = profitViewBy === 'olshop' ? olshopReport : kurirReport;
                                            const filteredData = reportData.filter(item => item.profit > 0).sort((a,b) => b.profit - a.profit);
                                            
                                            if (filteredData.length === 0) return <div className="p-8 text-center text-slate-500">Tidak ada profit yang dihasilkan di periode ini.</div>;

                                            return filteredData.map((item, idx) => {
                                                const uniqueId = profitViewBy + '_' + item.name;
                                                const isExpanded = expandedProfitItems.includes(uniqueId);
                                                const suksesPackages = item.paketTerkait.filter(p => String(p.status).toLowerCase() === 'sukses');

                                                return (
                                                    <div key={idx} className="flex flex-col border-b border-slate-700/50 hover:bg-slate-800/30 transition-colors">
                                                        
                                                        {/* BARIS UTAMA PROFIT (GRID SUPER COMPACT) */}
                                                        <div 
                                                            className="flex items-center justify-between p-3 md:p-4 cursor-pointer"
                                                            onClick={() => toggleProfitItem(uniqueId)}
                                                        >
                                                            {/* Bagian Kiri: Nama */}
                                                            <div className="flex items-center gap-2.5 w-[250px] md:w-[350px] shrink-0">
                                                                <div className={`w-5 h-5 rounded flex items-center justify-center transition-transform ${isExpanded ? 'bg-emerald-500 text-white rotate-180' : 'bg-slate-700 text-slate-400'}`}>
                                                                    <i className="fas fa-chevron-down text-[10px]"></i>
                                                                </div>
                                                                <i className={`fas ${profitViewBy === 'olshop' ? 'fa-store' : 'fa-motorcycle'} text-slate-500`}></i>
                                                                <span className="font-bold text-slate-200 uppercase truncate text-xs md:text-sm">{item.name}</span>
                                                            </div>
                                                            
                                                            {/* Bagian Kanan: Matrix Keuangan Dalam 1 Baris */}
                                                            <div className="flex-1 flex justify-end items-center gap-6">
                                                                <div className="flex flex-col items-end justify-center min-w-[70px]">
                                                                    <span className="text-[8px] font-bold text-slate-500 uppercase tracking-widest mb-0.5">PKT SUKSES</span>
                                                                    <span className="bg-emerald-900/40 text-emerald-400 border border-emerald-800 px-2 py-0.5 rounded text-[10px] font-bold"><i className="fas fa-check-circle mr-1"></i>{suksesPackages.length} Pkt</span>
                                                                </div>
                                                                <div className="flex flex-col items-end justify-center min-w-[120px] pl-2 border-l border-slate-700">
                                                                    <span className="text-[8px] font-bold text-emerald-500/70 uppercase tracking-widest mb-0.5">TOTAL PROFIT DIHASILKAN</span>
                                                                    <span className={`text-[13px] md:text-[15px] font-black text-emerald-400`}>+{formatCurrency(item.profit)}</span>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        {/* RINCIAN DALAM PROFIT */}
                                                        {isExpanded && (
                                                            <div className="p-3 md:p-4 bg-[#0f172a]/60 animate-fade-in-down border-t border-slate-700/50">
                                                                <div className="flex items-center mb-3">
                                                                    <h4 className="text-slate-400 font-bold text-[10px] uppercase tracking-widest flex items-center"><i className="fas fa-boxes mr-2"></i>Rincian Profit Resi: {item.name}</h4>
                                                                </div>
                                                                
                                                                <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-3">
                                                                    {suksesPackages.map((pkg, pIdx) => {
                                                                        const { hBarang, tagihan, oDasar, oTambahan } = getFinancials(pkg);
                                                                        
                                                                        let displayKurir = String(pkg.kurirId || 'Tanpa Kurir').split('@')[0];
                                                                        let displayTgl = String(pkg.dateString || pkg.tanggal || '-');
                                                                        if (displayTgl !== '-' && displayTgl.includes('T')) displayTgl = displayTgl.split('T')[0];

                                                                        return (
                                                                            <div key={pIdx} className="bg-[#1e293b] border border-slate-600/50 rounded-xl p-3 flex flex-col relative shadow-sm hover:border-emerald-700/50 transition-colors group">
                                                                                <div className="flex justify-between items-start border-b border-slate-700/50 pb-2 mb-2">
                                                                                    <div className="flex-1 pr-2">
                                                                                        <div className="flex items-center space-x-2">
                                                                                            <div className="text-[#e65c00] font-mono text-[10px] md:text-xs font-bold bg-orange-900/20 px-1.5 py-0.5 rounded border border-orange-800/30 inline-block">{pkg.packageId}</div>
                                                                                            <span className="text-slate-500 text-[9px]"><i className="far fa-calendar-alt mr-1"></i>{displayTgl}</span>
                                                                                        </div>
                                                                                        <div className="text-slate-200 font-bold text-xs md:text-sm mt-1.5 truncate">{pkg.customerName}</div>
                                                                                        
                                                                                        {profitViewBy === 'olshop' ? (
                                                                                            <div className="text-slate-400 text-[10px] md:text-xs flex items-center mt-1"><i className="fas fa-motorcycle mr-1.5 text-slate-500 w-3 text-center"></i> Kurir: <span className="font-medium text-slate-300 ml-1">{displayKurir}</span></div>
                                                                                        ) : (
                                                                                            <div className="text-slate-400 text-[10px] md:text-xs flex items-center mt-1"><i className="fas fa-store mr-1.5 text-slate-500 w-3 text-center"></i> Olshop: <span className="font-medium text-slate-300 ml-1">{pkg.olshopName}</span></div>
                                                                                        )}
                                                                                    </div>
                                                                                    
                                                                                    <div className="flex-shrink-0 flex flex-col items-end justify-center h-full bg-emerald-900/20 p-2 rounded-lg border border-emerald-800/30">
                                                                                        <div className="text-[9px] text-emerald-500 mb-0.5 uppercase font-bold tracking-widest">Profit Bersih</div>
                                                                                        <div className="font-black text-emerald-400 text-sm md:text-base">+{formatCurrency(oDasar)}</div>
                                                                                    </div>
                                                                                </div>
                                                                                
                                                                                <div className="mt-auto pt-1 flex justify-between items-center text-[10px] md:text-xs text-slate-400">
                                                                                    <span>Metode: <span className="font-bold text-slate-200">{pkg.metodeBayar || '-'}</span></span>
                                                                                    <span>Hak Kurir (Tamb): <span className="font-bold text-orange-400">{formatCurrency(oTambahan)}</span></span>
                                                                                </div>
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            });
                                        })()}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* =========================================================
                        MODAL EDIT DATA / REVISI HARGA
                        ========================================================= */}
                    {editingPkg && (
                        <div className="fixed inset-0 z-[999] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 animate-fade-in-down">
                            <div className="bg-[#1e293b] rounded-2xl border border-slate-700 shadow-2xl w-full max-w-sm overflow-hidden">
                                <div className="p-4 border-b border-slate-700 bg-slate-800 flex justify-between items-center">
                                    <h3 className="font-bold text-white text-sm"><i className="fas fa-edit text-blue-500 mr-2"></i> Edit Revisi Harga</h3>
                                    <button onClick={() => setEditingPkg(null)} className="text-slate-400 hover:text-white transition-colors"><i className="fas fa-times"></i></button>
                                </div>
                                
                                <form onSubmit={handleSaveEdit} className="p-5">
                                    <div className="mb-4">
                                        <p className="text-xs text-slate-400 mb-1 uppercase tracking-wider font-bold">Nomor Resi</p>
                                        <p className="text-base font-black text-[#e65c00] bg-slate-900 p-2 rounded-lg border border-slate-700">{editingPkg.packageId}</p>
                                    </div>

                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Total Tagihan (Customer)</label>
                                            <div className="relative">
                                                <span className="absolute left-3 top-2 text-slate-500 font-bold text-sm">Rp</span>
                                                <input type="number" name="totalTagihan" value={editFormData.totalTagihan} onChange={handleEditFormChange} className="w-full bg-slate-900 border border-slate-600 rounded-lg pl-9 pr-3 py-2 text-sm text-white font-bold outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" required />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-emerald-500/80 uppercase tracking-widest block mb-1">Harga Barang Bersih</label>
                                            <div className="relative">
                                                <span className="absolute left-3 top-2 text-slate-500 font-bold text-sm">Rp</span>
                                                <input type="number" name="hargaPaket" value={editFormData.hargaPaket} onChange={handleEditFormChange} className="w-full bg-slate-900 border border-emerald-800/50 rounded-lg pl-9 pr-3 py-2 text-sm text-emerald-400 font-bold outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all" required />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="text-[10px] font-bold text-red-400/80 uppercase tracking-widest block mb-1">Ongkir Dasar</label>
                                                <div className="relative">
                                                    <span className="absolute left-2.5 top-2 text-slate-500 font-bold text-sm">Rp</span>
                                                    <input type="number" name="ongkirDasar" value={editFormData.ongkirDasar} onChange={handleEditFormChange} className="w-full bg-slate-900 border border-red-800/50 rounded-lg pl-8 pr-2 py-2 text-sm text-red-400 font-bold outline-none focus:border-red-500 transition-all" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold text-orange-400/80 uppercase tracking-widest block mb-1">Ongkir Tamb/Vol</label>
                                                <div className="relative">
                                                    <span className="absolute left-2.5 top-2 text-slate-500 font-bold text-sm">Rp</span>
                                                    <input type="number" name="tambahanOngkir" value={editFormData.tambahanOngkir} onChange={handleEditFormChange} className="w-full bg-slate-900 border border-orange-800/50 rounded-lg pl-8 pr-2 py-2 text-sm text-orange-400 font-bold outline-none focus:border-orange-500 transition-all" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-6 flex gap-3">
                                        <button type="button" onClick={() => setEditingPkg(null)} disabled={isSavingEdit} className="w-1/3 py-2.5 rounded-lg font-bold text-slate-300 bg-slate-700 hover:bg-slate-600 transition-colors text-xs">Batal</button>
                                        <button type="submit" disabled={isSavingEdit} className="w-2/3 py-2.5 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-500 transition-colors flex justify-center items-center shadow-lg shadow-blue-900/50 text-xs">
                                            {isSavingEdit ? <><i className="fas fa-spinner fa-spin mr-2"></i> Menyimpan...</> : <><i className="fas fa-save mr-2"></i> Simpan Revisi</>}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* =========================================================
                        MODAL KONFIRMASI PENCAIRAN
                        ========================================================= */}
                    {isCairkanModalOpen && selectedOlshopToCairkan && (
                        <div className="fixed inset-0 z-[999] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 animate-fade-in-down">
                            <div className="bg-[#1e293b] rounded-2xl border border-slate-700 shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="p-5 border-b border-slate-700 bg-slate-800 flex justify-between items-center">
                                    <h3 className="font-bold text-white text-lg"><i className="fas fa-hand-holding-usd text-emerald-500 mr-2"></i> Konfirmasi Pencairan</h3>
                                    <button onClick={() => setIsCairkanModalOpen(false)} className="text-slate-400 hover:text-white transition-colors"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="p-5">
                                    <p className="text-slate-300 text-sm mb-4">Anda akan memproses pencairan dana untuk Olshop berikut:</p>
                                    <div className="bg-slate-900 rounded-xl p-4 border border-slate-700 mb-5">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-slate-400 text-xs font-bold uppercase tracking-wider">Nama Olshop</span>
                                            <span className="text-white font-bold">{selectedOlshopToCairkan.name}</span>
                                        </div>
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-slate-400 text-xs font-bold uppercase tracking-wider">Jumlah Paket</span>
                                            <span className="text-white font-bold bg-slate-700 px-2 py-0.5 rounded text-xs">{selectedOlshopToCairkan.paketBelumCairIds.length} Pkt</span>
                                        </div>
                                        <div className="flex justify-between items-center border-t border-slate-700 pt-3 mt-3">
                                            <span className="text-emerald-500/70 text-xs font-bold uppercase tracking-wider">Total Dana Cair</span>
                                            <span className="text-emerald-400 font-black text-lg">{formatCurrency(selectedOlshopToCairkan.nominalBelumCair)}</span>
                                        </div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={() => setIsCairkanModalOpen(false)} disabled={isProcessingCair} className="flex-1 py-2.5 rounded-xl font-bold text-slate-300 bg-slate-700 hover:bg-slate-600 transition-colors">Batal</button>
                                        <button onClick={handleProsesCairkan} disabled={isProcessingCair} className="flex-1 py-2.5 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-500 transition-colors flex justify-center items-center shadow-lg shadow-emerald-900/50">
                                            {isProcessingCair ? <><i className="fas fa-spinner fa-spin mr-2"></i> Memproses...</> : 'Ya, Cairkan Sekarang'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL FOTO MEMBESAR */}
                    {selectedImage && (
                        <div 
                            className="fixed inset-0 z-[999] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 transition-opacity"
                            onClick={() => setSelectedImage(null)}
                        >
                            <div className="relative w-full max-w-lg md:max-w-2xl flex flex-col items-center transform transition-all scale-100" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setSelectedImage(null)} className="absolute -top-12 right-0 text-white bg-red-500/80 hover:bg-red-500 w-10 h-10 rounded-full flex items-center justify-center transition-colors shadow-lg border border-white/20">
                                    <i className="fas fa-times text-xl"></i>
                                </button>
                                <img src={selectedImage} alt="Foto Paket Membesar" className="w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl border-4 border-white/10 bg-slate-900" />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
