<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Admin - Exceed Express</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="Logo.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (Versi Stabil 7.22.20) -->
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>

    <style>
        body { touch-action: manipulation; background-color: #0f172a; font-family: 'Segoe UI', system-ui, sans-serif; color: #f8fafc; overflow: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }
        
        .progress-bar-striped {
            background-image: linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent);
            background-size: 1rem 1rem;
        }

        /* Input Number Hilangkan Panah Spinner */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        
        /* Ubah warna panah dropdown/select */
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        /* Scrollbar kustom untuk modal agar bisa pakai kursor mouse di laptop */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="antialiased text-slate-200">
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */

        const { useState, useEffect, useMemo } = React;

        const loadLocal = (key, fallback) => {
            try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; }
        };

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount || 0);
        };

        function App() {
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec"; 
            const APPSHEET_APP_ID = "APLIKASEXCEED-327461285";

            const [isMasterLoggedIn, setIsMasterLoggedIn] = useState(() => loadLocal('exceed_master_logged_in', false));
            const [isLoadingSync, setIsLoadingSync] = useState(false);
            const [syncMessage, setSyncMessage] = useState({ text: '', type: '' });
            
            const [loginUname, setLoginUname] = useState('');
            const [loginPass, setLoginPass] = useState('');

            const [packages, setPackages] = useState(() => loadLocal('exceed_master_packages', []));
            const [masterOlshops, setMasterOlshops] = useState([]);
            const [masterZonas, setMasterZonas] = useState([]);
            const [masterKurirs, setMasterKurirs] = useState([]);
            
            const [searchQuery, setSearchQuery] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [globalStatusFilter, setGlobalStatusFilter] = useState('semua');
            
            const [activeTab, setActiveTab] = useState('olshop'); 
            
            const [expandedOlshops, setExpandedOlshops] = useState([]); 
            const [olshopFilters, setOlshopFilters] = useState({}); 
            const [expandedKurirs, setExpandedKurirs] = useState([]); 
            const [kurirFilters, setKurirFilters] = useState({}); 

            const [selectedImage, setSelectedImage] = useState(null);
            
            const [isCairkanModalOpen, setIsCairkanModalOpen] = useState(false);
            const [selectedOlshopToCairkan, setSelectedOlshopToCairkan] = useState(null);
            const [isProcessingCair, setIsProcessingCair] = useState(false);

            // ==========================================
            // STATE FITUR EDIT PAKET
            // ==========================================
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isProcessingEdit, setIsProcessingEdit] = useState(false);
            const [editModal, setEditModal] = useState({
                packageId: '', olshopName: '', status: '', metodeBayar: '', 
                hargaPaket: 0, ongkirKode: '', ongkirDasar: 0, tambahanOngkir: 0, 
                kurirId: '', tanggal: ''
            });

            // ==========================================
            // BIAYA OPERASIONAL & GAJI DINAMIS (BARU)
            // ==========================================
            const [opsCosts, setOpsCosts] = useState(() => loadLocal('exceed_ops_costs', { sewaKos: 0, biayaListrik: 0, biayaWifi: 0, akomodasi: 0, gajiAdmin: 0, lainLain: 0 }));
            const [workDays, setWorkDays] = useState(() => loadLocal('exceed_work_days', 26));

            // State Gaji Harian per Kurir: { 'NAMA': { gajiHarian: 150000, tglMasuk: '2026-06-01', tglAkhir: '2026-06-26' } }
            const [kurirSettings, setKurirSettings] = useState(() => loadLocal('exceed_kurir_settings', {}));

            const handleOpsChange = (field, value) => {
                const numValue = value === '' ? '' : Number(value);
                setOpsCosts(prev => ({ ...prev, [field]: numValue }));
            };

            const updateKurirSetting = (kurirName, field, value) => {
                setKurirSettings(prev => ({
                    ...prev,
                    [kurirName]: {
                        ...(prev[kurirName] || { gajiHarian: 150000, tglMasuk: '', tglAkhir: '' }),
                        [field]: value
                    }
                }));
            };

            const toggleOlshop = (name) => setExpandedOlshops(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
            const toggleKurir = (name) => setExpandedKurirs(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
            const openCairkanModal = (olshop) => { setSelectedOlshopToCairkan(olshop); setIsCairkanModalOpen(true); };

            useEffect(() => { localStorage.setItem('exceed_master_logged_in', JSON.stringify(isMasterLoggedIn)); }, [isMasterLoggedIn]);
            useEffect(() => { localStorage.setItem('exceed_master_packages', JSON.stringify(packages)); }, [packages]);
            useEffect(() => { localStorage.setItem('exceed_ops_costs', JSON.stringify(opsCosts)); }, [opsCosts]);
            useEffect(() => { localStorage.setItem('exceed_work_days', JSON.stringify(workDays)); }, [workDays]);
            useEffect(() => { localStorage.setItem('exceed_kurir_settings', JSON.stringify(kurirSettings)); }, [kurirSettings]);

            const getFinancials = (pkg) => {
                const hBarang = Number(pkg.hargaPaket) || 0;
                const tagihan = Number(pkg.totalTagihan) || 0;
                const selisihTagihan = tagihan - hBarang > 0 ? tagihan - hBarang : 0;
                
                let oTambahan = Number(pkg.tambahanOngkir) || 0;
                let oDasar = Number(pkg.ongkirDasar) || 0;
                
                if (oTambahan === 0 && oDasar > 0 && selisihTagihan > oDasar) oTambahan = selisihTagihan - oDasar;
                else if (oTambahan === 0 && oDasar === 0 && selisihTagihan > 0) oDasar = selisihTagihan;
                if (oDasar === 0 && oTambahan > 0 && selisihTagihan > oTambahan) oDasar = selisihTagihan - oTambahan;

                return { hBarang, tagihan, oDasar, oTambahan, oTotal: oDasar + oTambahan };
            };

            const getFotoUrl = (pkg) => {
                const fileKey = pkg.fotoBukti || pkg.foto_bukti || pkg.foto || pkg.bukti || pkg.gambar;
                if (!fileKey || String(fileKey).trim() === '') return null;
                if (String(fileKey).startsWith('http://') || String(fileKey).startsWith('https://')) return fileKey;
                return `https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(fileKey)}`;
            };

            const syncData = async (isLoginAttempt = false) => {
                setIsLoadingSync(true);
                if(!isLoginAttempt) setSyncMessage({ text: '', type: '' });
                
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=getInitData&t=${new Date().getTime()}`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setPackages(result.data.packages || []);
                        setMasterOlshops(result.data.olshop || []);
                        setMasterZonas(result.data.zona || []);
                        setMasterKurirs(result.data.kurir || []);

                        if(!isLoginAttempt) {
                            setSyncMessage({ text: 'Data berhasil diperbarui!', type: 'success' });
                            setTimeout(() => setSyncMessage({ text: '', type: '' }), 3000);
                        }
                        return true;
                    } else {
                        setSyncMessage({ text: 'Gagal memuat data dari server.', type: 'error' });
                        return false;
                    }
                } catch (error) {
                    setSyncMessage({ text: 'Koneksi terputus. Cek internet Anda.', type: 'error' });
                    return false;
                } finally {
                    setIsLoadingSync(false);
                }
            };

            useEffect(() => {
                if (isMasterLoggedIn) { syncData(); }
            }, [isMasterLoggedIn]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setSyncMessage({ text: 'Memeriksa kredensial...', type: 'info' });
                const validUser1 = loginUname === 'ellyasma991' && loginPass === '082213663662';
                const validUser2 = loginUname === 'idypandu' && loginPass === '082257849332';
                if (validUser1 || validUser2) {
                    setIsMasterLoggedIn(true);
                    setLoginUname(''); setLoginPass('');
                    syncData();
                } else {
                    setSyncMessage({ text: 'Username atau Password Salah.', type: 'error' });
                }
            };

            const handleLogout = () => { setIsMasterLoggedIn(false); setPackages([]); };

            const handleProsesCairkan = async () => {
                if (!selectedOlshopToCairkan || selectedOlshopToCairkan.paketBelumCairIds.length === 0) return;
                setIsProcessingCair(true);
                setSyncMessage({ text: `Memproses pencairan ${selectedOlshopToCairkan.name}...`, type: 'info' });
                try {
                    const formData = new URLSearchParams();
                    formData.append('action', 'cairkanPaket');
                    formData.append('packageIds', JSON.stringify(selectedOlshopToCairkan.paketBelumCairIds));
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();
                    if (result.status === 'success') {
                        setSyncMessage({ text: `Berhasil mencairkan ${result.updated} paket untuk ${selectedOlshopToCairkan.name}!`, type: 'success' });
                        setIsCairkanModalOpen(false);
                        syncData(); 
                    } else setSyncMessage({ text: 'Gagal memproses: ' + result.message, type: 'error' });
                } catch (error) { setSyncMessage({ text: 'Terjadi kesalahan jaringan.', type: 'error' }); } 
                finally { setIsProcessingCair(false); }
            };

            // ==========================================
            // LOGIKA FORM EDIT PAKET
            // ==========================================
            const openEditModal = (pkg) => {
                let tgl = pkg.dateString || pkg.tanggalInput || '';
                if (tgl && tgl.includes('T')) tgl = tgl.split('T')[0];
                else if (tgl) {
                    try { const d = new Date(tgl); if (!isNaN(d.getTime())) tgl = d.toISOString().split('T')[0]; } 
                    catch(e) {}
                }

                setEditModal({
                    isOpen: true,
                    packageId: pkg.packageId,
                    olshopName: pkg.olshopName || '',
                    status: String(pkg.status).toUpperCase(),
                    metodeBayar: pkg.metodeBayar || '',
                    hargaPaket: pkg.hargaPaket || 0,
                    ongkirKode: pkg.ongkirKode || '',
                    ongkirDasar: pkg.ongkirDasar || 0,
                    tambahanOngkir: pkg.tambahanOngkir || 0,
                    kurirId: pkg.kurirEmailAsli || pkg.kurirId || '',
                    tanggal: tgl
                });
                setIsEditModalOpen(true);
            };

            const handleOngkirKodeChange = (val) => {
                const zona = masterZonas.find(z => z.id === val || z.nama === val);
                const harga = zona ? zona.harga : 0;
                setEditModal(prev => ({ ...prev, ongkirKode: val, ongkirDasar: harga }));
            };

            const handleEditSubmit = async (e) => {
                e.preventDefault();
                setIsProcessingEdit(true);
                setSyncMessage({ text: `Menyimpan perubahan resi ${editModal.packageId}...`, type: 'info' });

                try {
                    const formData = new URLSearchParams();
                    formData.append('action', 'editPackageMaster'); 
                    formData.append('packageId', editModal.packageId);
                    formData.append('olshopName', editModal.olshopName);
                    formData.append('status', editModal.status);
                    formData.append('metodeBayar', editModal.metodeBayar); // Jika '', akan dikirim kosong
                    formData.append('hargaPaket', editModal.hargaPaket);
                    formData.append('ongkirKode', editModal.ongkirKode); 
                    formData.append('tambahanOngkir', editModal.tambahanOngkir);
                    formData.append('kurirId', editModal.kurirId); 
                    formData.append('tanggal', editModal.tanggal);

                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
                    const result = await response.json();

                    if (result.status === 'success') {
                        setSyncMessage({ text: 'Perubahan berhasil disimpan!', type: 'success' });
                        setIsEditModalOpen(false);
                        syncData(); 
                    } else setSyncMessage({ text: 'Gagal mengedit: ' + result.message, type: 'error' });
                } catch (error) { setSyncMessage({ text: 'Terjadi kesalahan jaringan.', type: 'error' }); } 
                finally { setIsProcessingEdit(false); }
            };

            const { filteredPkgs, olshopReport, kurirReport, globalSummary } = useMemo(() => {
                let pkgs = packages;
                if (searchQuery) {
                    const q = searchQuery.toLowerCase().trim();
                    pkgs = pkgs.filter(p => String(p.customerName || '').toLowerCase().includes(q) || String(p.packageId || '').toLowerCase().includes(q) || String(p.olshopName || '').toLowerCase().includes(q) || String(p.kurirId || '').toLowerCase().includes(q));
                }
                if (startDate || endDate) {
                   pkgs = pkgs.filter(p => {
                      let pDateStr = p.dateString || p.tanggal || '';
                      if (!pDateStr) return false;
                      let normalizedDateStr = "";
                      try {
                          let d = new Date(pDateStr);
                          if (isNaN(d.getTime()) && pDateStr.includes('/')) {
                              const parts = pDateStr.split('/');
                              if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
                          }
                          if (!isNaN(d.getTime())) {
                              const year = d.getFullYear(); const month = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0');
                              normalizedDateStr = `${year}-${month}-${day}`;
                          } else { normalizedDateStr = pDateStr.split('T')[0]; }
                      } catch(e) { normalizedDateStr = pDateStr.split('T')[0]; }
                      const sDate = startDate ? startDate : "2000-01-01";
                      const eDate = endDate ? endDate : "2100-01-01";
                      return normalizedDateStr >= sDate && normalizedDateStr <= eDate;
                   });
                }
                if (globalStatusFilter !== 'semua') {
                    pkgs = pkgs.filter(p => {
                        let stat = String(p.status).toLowerCase().trim().replace(' ', '_');
                        if (globalStatusFilter === 'proses') return stat === 'siap_antar' || stat === 'proses';
                        if (globalStatusFilter === 'cancel') return stat === 'cancel' || stat === 'batal';
                        return stat === globalStatusFilter;
                    });
                }

                const oReport = {}; const kReport = {};
                const summary = { totalPencairanOlshop: 0, totalDanaBelumCair: 0, totalDanaCair: 0, totalSetoranKurir: 0, totalPaketSukses: 0, totalOngkirTambahanKurir: 0, totalProfitPerusahaan: 0 };

                pkgs.forEach(pkg => {
                    const statusPkg = String(pkg.status).toLowerCase().trim().replace(' ', '_');
                    const olshopName = String(pkg.olshopName || 'Tanpa Nama').toUpperCase();
                    const kurirName = String(pkg.kurirId || 'Tanpa Kurir').split('@')[0].toUpperCase();
                    const metode = String(pkg.metodeBayar).trim().toUpperCase();
                    const { hBarang, oDasar, oTambahan, oTotal } = getFinancials(pkg);

                    if (!oReport[olshopName]) oReport[olshopName] = { totalSukses: 0, totalProses: 0, totalPending: 0, totalCancel: 0, pencairan: 0, potongan: 0, potonganDasar: 0, potonganTambahan: 0, totalDasar: 0, totalTambahan: 0, nilaiBarang: 0, nominalBelumCair: 0, paketBelumCairIds: [], paketBelumCairDetails: [], paketTerkait: [] };
                    if (!kReport[kurirName]) kReport[kurirName] = { totalSukses: 0, totalProses: 0, totalPending: 0, totalCancel: 0, setoran: 0, rincianCash: 0, rincianMinusTf: 0, totalTfOlshop: 0, totalTfKantor: 0, totalTambahanOngkir: 0, tambahanOngkirCash: 0, tambahanOngkirTF: 0, paketTerkait: [], totalDasarOngkir: 0, profitPerusahaan: 0 };
                    
                    oReport[olshopName].paketTerkait.push(pkg);
                    kReport[kurirName].paketTerkait.push(pkg);

                    if (statusPkg === 'sukses') {
                        oReport[olshopName].totalSukses += 1;
                        kReport[kurirName].totalSukses += 1;
                        summary.totalPaketSukses += 1;
                        summary.totalOngkirTambahanKurir += oTambahan; 
                        summary.totalProfitPerusahaan += oDasar; 
                        
                        oReport[olshopName].totalDasar += oDasar;
                        oReport[olshopName].totalTambahan += oTambahan;
                        
                        kReport[kurirName].totalTambahanOngkir += oTambahan;
                        kReport[kurirName].totalDasarOngkir += oDasar;
                        kReport[kurirName].profitPerusahaan += oDasar; 

                        const isCair = String(pkg.statusPencairan).toLowerCase() === 'cair';

                        let pencairan = 0; let potongan = 0;
                        if (metode === 'TF OLSHOP') { potongan = oTotal; oReport[olshopName].potonganDasar += oDasar; oReport[olshopName].potonganTambahan += oTambahan; pencairan = -oTotal; } 
                        else if (metode === 'CASH' || metode === 'TF KANTOR' || metode === 'COD') { pencairan = hBarang; }

                        oReport[olshopName].pencairan += pencairan;
                        if (metode === 'TF OLSHOP') oReport[olshopName].potongan += oTotal;
                        if (metode === 'CASH' || metode === 'TF KANTOR' || metode === 'COD') oReport[olshopName].nilaiBarang += hBarang;
                        summary.totalPencairanOlshop += pencairan;

                        if (!isCair) {
                            oReport[olshopName].nominalBelumCair += pencairan;
                            oReport[olshopName].paketBelumCairIds.push(pkg.packageId); 
                            oReport[olshopName].paketBelumCairDetails.push(pkg);
                            summary.totalDanaBelumCair += pencairan;
                        } else { summary.totalDanaCair += pencairan; }

                        let setoranKurir = 0;
                        if (metode === 'TF OLSHOP' || metode === 'TF KANTOR') {
                            if (metode === 'TF OLSHOP') kReport[kurirName].totalTfOlshop += hBarang;
                            if (metode === 'TF KANTOR') kReport[kurirName].totalTfKantor += hBarang;
                            kReport[kurirName].rincianMinusTf += oTotal;
                            kReport[kurirName].tambahanOngkirTF += oTambahan; 
                            setoranKurir = -oTambahan; 
                        } else if (metode === 'CASH' || metode === 'COD') {
                            const cashDiterima = hBarang + oDasar + oTambahan; 
                            kReport[kurirName].rincianCash += cashDiterima;
                            kReport[kurirName].tambahanOngkirCash += oTambahan; 
                            setoranKurir = hBarang + oDasar; 
                        }
                        kReport[kurirName].setoran += setoranKurir;
                        summary.totalSetoranKurir += setoranKurir;

                    } else if (statusPkg === 'cancel' || statusPkg === 'batal') { oReport[olshopName].totalCancel += 1; kReport[kurirName].totalCancel += 1; } 
                    else if (statusPkg === 'pending') { oReport[olshopName].totalPending += 1; kReport[kurirName].totalPending += 1; } 
                    else { oReport[olshopName].totalProses += 1; kReport[kurirName].totalProses += 1; }
                });

                const activeOReport = Object.keys(oReport).filter(k => oReport[k].paketTerkait.length > 0).reduce((obj, key) => { obj[key] = oReport[key]; return obj; }, {});
                const activeKReport = Object.keys(kReport).filter(k => kReport[k].paketTerkait.length > 0).reduce((obj, key) => { obj[key] = kReport[key]; return obj; }, {});

                const sortedOlshop = Object.keys(activeOReport).map(k => ({ name: k, ...activeOReport[k] })).sort((a, b) => b.pencairan - a.pencairan);
                const sortedKurir = Object.keys(activeKReport).map(k => ({ name: k, ...activeKReport[k] })).sort((a, b) => b.setoran - a.setoran);

                return { filteredPkgs: pkgs, olshopReport: sortedOlshop, kurirReport: sortedKurir, globalSummary: summary };
            }, [packages, startDate, endDate, globalStatusFilter, searchQuery]);

            const totalBiayaOperasional = Object.values(opsCosts).reduce((acc, curr) => acc + (Number(curr) || 0), 0);
            const jumlahKurirAktif = kurirReport.length;
            const bebanOpsPerKurir = jumlahKurirAktif > 0 ? totalBiayaOperasional / jumlahKurirAktif : 0;
            
            const totalGajiKurirSeluruhnya = kurirReport.reduce((acc, kur) => {
                const ks = kurirSettings[kur.name] || { gajiHarian: 150000, tglMasuk: '', tglAkhir: '' };
                const hKerja = (ks.tglMasuk && ks.tglAkhir) ? Math.max(1, Math.ceil((new Date(ks.tglAkhir) - new Date(ks.tglMasuk)) / (1000 * 60 * 60 * 24)) + 1) : 0;
                return acc + (hKerja * (Number(ks.gajiHarian) || 0));
            }, 0);

            const targetPerusahaanGlobal = totalBiayaOperasional + totalGajiKurirSeluruhnya;
            const rataRataOngkirGlobal = globalSummary.totalPaketSukses > 0 ? globalSummary.totalProfitPerusahaan / globalSummary.totalPaketSukses : 0;
            const estimasiTargetPaketBulan = rataRataOngkirGlobal > 0 ? Math.ceil(targetPerusahaanGlobal / rataRataOngkirGlobal) : 0;
            const estimasiTargetPaketHari = workDays > 0 ? Math.ceil(estimasiTargetPaketBulan / workDays) : 0; 

            const StatusBadgeAdmin = ({ status }) => {
                const s = String(status).toLowerCase();
                if(s === 'sukses') return <span className="text-emerald-400 bg-emerald-900/30 px-1.5 py-0.5 rounded text-[8px] md:text-[9px] font-bold uppercase border border-emerald-800/50"><i className="fas fa-check-circle mr-1"></i>Sukses</span>;
                if(s === 'cancel' || s === 'batal') return <span className="text-red-400 bg-red-900/30 px-1.5 py-0.5 rounded text-[8px] md:text-[9px] font-bold uppercase border border-red-800/50"><i className="fas fa-times-circle mr-1"></i>Cancel</span>;
                if(s === 'pending') return <span className="text-orange-400 bg-orange-900/30 px-1.5 py-0.5 rounded text-[8px] md:text-[9px] font-bold uppercase border border-orange-800/50"><i className="fas fa-clock mr-1"></i>Pending</span>;
                return <span className="text-blue-400 bg-blue-900/30 px-1.5 py-0.5 rounded text-[8px] md:text-[9px] font-bold uppercase border border-blue-800/50"><i className="fas fa-truck mr-1"></i>Proses</span>;
            };

            if (!isMasterLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#0f172a] p-4 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-[#1e293b] to-[#0f172a]"></div>
                        <div className="bg-[#1e293b] p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center relative z-10 border border-slate-700 mt-8">
                            <div className="w-20 h-20 bg-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-4 text-emerald-500 shadow-inner border border-slate-700">
                                <i className="fas fa-crown text-4xl"></i>
                            </div>
                            <h1 className="text-2xl font-black text-white tracking-tight">MASTER ADMIN</h1>
                            <p className="text-sm text-slate-400 mb-8 font-medium">Exceed Express Analytics</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                {syncMessage.text && (
                                    <div className={`text-xs py-3 px-3 rounded-xl font-bold flex items-start text-left ${syncMessage.type === 'error' ? 'bg-red-900/50 text-red-400 border border-red-800' : 'bg-blue-900/50 text-blue-400 border border-blue-800'}`}>
                                        <i className={`fas ${syncMessage.type === 'error' ? 'fa-exclamation-triangle' : 'fa-spinner fa-spin'} mr-2 mt-0.5`}></i>
                                        <span>{syncMessage.text}</span>
                                    </div>
                                )}
                                <div className="relative">
                                    <i className="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                                    <input type="text" required value={loginUname} onChange={(e) => setLoginUname(e.target.value)} placeholder="Username ID" className="w-full pl-12 pr-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl text-sm outline-none focus:border-emerald-500 text-white transition-all font-medium placeholder-slate-500" disabled={isLoadingSync} />
                                </div>
                                <div className="relative">
                                    <i className="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                                    <input type="password" required value={loginPass} onChange={(e) => setLoginPass(e.target.value)} placeholder="Password (Nomor HP)" className="w-full pl-12 pr-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl text-sm outline-none focus:border-emerald-500 text-white transition-all font-medium placeholder-slate-500" disabled={isLoadingSync} />
                                </div>
                                <button type="submit" disabled={isLoadingSync} className={`w-full text-white font-bold py-3.5 rounded-xl shadow-lg transition-all transform active:scale-95 flex justify-center items-center mt-2 ${isLoadingSync ? 'bg-slate-600 cursor-not-allowed shadow-none' : 'bg-emerald-600 hover:bg-emerald-500 shadow-emerald-900/50'}`}>
                                    {isLoadingSync ? <><i className="fas fa-sync-alt animate-spin mr-2"></i> Memproses...</> : 'Masuk Dashboard'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen bg-[#0f172a] font-sans w-full mx-auto shadow-2xl relative flex flex-col">
                    <header className="bg-[#1e293b] px-4 py-3 md:py-4 shadow-md z-10 sticky top-0 flex justify-between items-center border-b border-slate-700 shrink-0">
                        <div className="flex items-center">
                            <div className="w-8 h-8 md:w-10 md:h-10 bg-emerald-600 rounded-lg flex items-center justify-center mr-3 text-white shadow-sm">
                                <i className="fas fa-crown text-sm md:text-base"></i>
                            </div>
                            <div>
                                <p className="text-[9px] md:text-[10px] text-emerald-400 font-bold uppercase tracking-widest mb-0.5">EXCEED EXPRESS</p>
                                <h1 className="text-sm md:text-lg lg:text-xl font-black text-white leading-none truncate">MASTER DASHBOARD</h1>
                            </div>
                        </div>
                        <button onClick={handleLogout} className="text-[10px] md:text-xs font-bold text-slate-300 hover:text-white bg-slate-800 hover:bg-red-500 border border-slate-600 px-3 py-1.5 rounded-lg transition-colors flex items-center shadow-sm">
                            <span className="hidden md:inline mr-2">Tutup Sesi</span> <i className="fas fa-power-off"></i>
                        </button>
                    </header>

                    <div className="flex-1 overflow-y-auto p-3 md:p-5 lg:p-6 space-y-4 md:space-y-6 pb-10 max-w-7xl mx-auto w-full custom-scrollbar">
                        
                        <div className="bg-[#1e293b] p-3 md:p-4 rounded-xl shadow-sm border border-slate-700 flex flex-col space-y-3">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 w-full">
                                <div className="relative w-full md:max-w-sm">
                                    <i className="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 text-xs"></i>
                                    <input type="text" placeholder="Cari Resi, Customer, Olshop, Kurir..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-8 pr-3 py-2.5 bg-slate-800 border border-slate-600 rounded-lg text-[10px] md:text-xs outline-none focus:border-emerald-500 text-slate-200 placeholder-slate-500 transition-colors" />
                                </div>
                                
                                <div className="flex flex-col md:flex-row items-center gap-2 w-full md:w-auto">
                                    <div className="relative w-full md:w-36">
                                        <i className="fas fa-calendar absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 text-[10px] md:text-xs"></i>
                                        <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-slate-800 border border-slate-600 rounded-lg text-[10px] md:text-xs outline-none focus:border-emerald-500 text-slate-200" />
                                    </div>
                                    <span className="hidden md:block text-[10px] font-bold text-slate-500">Hingga</span>
                                    <div className="relative w-full md:w-36">
                                        <i className="fas fa-calendar absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 text-[10px] md:text-xs"></i>
                                        <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-slate-800 border border-slate-600 rounded-lg text-[10px] md:text-xs outline-none focus:border-emerald-500 text-slate-200" />
                                    </div>
                                    {(startDate || endDate) && (<button onClick={() => { setStartDate(''); setEndDate(''); }} className="p-2 bg-slate-700 text-red-400 rounded-lg hover:bg-slate-600 w-full md:w-auto flex justify-center items-center"><i className="fas fa-times-circle"></i></button>)}
                                    <button onClick={() => syncData()} disabled={isLoadingSync} className={`w-full md:w-auto flex items-center justify-center bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg transition-all ml-1 ${isLoadingSync ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                        <i className={`fas fa-sync-alt text-white mr-2 text-[10px] md:text-xs ${isLoadingSync ? 'animate-spin' : ''}`}></i>
                                        <span className="text-white text-[10px] md:text-xs font-bold">{isLoadingSync ? 'Memuat...' : 'Refresh'}</span>
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex items-center space-x-2 overflow-x-auto pb-1 scrollbar-hide w-full border-t border-slate-700/50 pt-3">
                                <span className="text-slate-400 text-[10px] md:text-xs font-bold flex items-center mr-2 flex-shrink-0"><i className="fas fa-filter mr-1.5"></i> Status:</span>
                                {[{id:'semua', label:'Semua'}, {id:'sukses', label:'Sukses'}, {id:'proses', label:'Proses'}, {id:'pending', label:'Pending'}, {id:'cancel', label:'Cancel'}].map(f => (
                                    <button key={f.id} onClick={() => setGlobalStatusFilter(f.id)} className={`px-3 py-1.5 rounded-lg text-[10px] md:text-xs font-bold uppercase transition-colors whitespace-nowrap border ${globalStatusFilter === f.id ? 'bg-emerald-600 text-white border-emerald-500' : 'bg-slate-800 text-slate-400 border-slate-600 hover:bg-slate-700 hover:text-slate-200'}`}>
                                        {f.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                            <div className="bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl p-4 md:p-5 text-white shadow-md relative overflow-hidden">
                                <div className="absolute -right-2 -bottom-4 opacity-20"><i className="fas fa-motorcycle text-[80px]"></i></div>
                                <p className="text-blue-100 text-[10px] md:text-xs font-bold uppercase tracking-widest mb-1">TOTAL UANG DI KURIR</p>
                                <h2 className="text-2xl md:text-3xl font-black mb-2">{formatCurrency(globalSummary.totalSetoranKurir)}</h2>
                                <p className="text-[9px] md:text-[10px] text-blue-100 flex items-center bg-black/20 w-fit px-2 py-1 rounded-md"><i className="fas fa-hand-holding-usd mr-1.5"></i> Tunai yang wajib disetor kurir</p>
                            </div>
                            <div className="bg-gradient-to-br from-[#e65c00] to-red-800 rounded-xl p-4 md:p-5 text-white shadow-md relative overflow-hidden">
                                <div className="absolute -right-2 -bottom-4 opacity-20"><i className="fas fa-store text-[80px]"></i></div>
                                <p className="text-orange-100 text-[10px] md:text-xs font-bold uppercase tracking-widest mb-1">DANA OLSHOP (BELUM CAIR)</p>
                                <h2 className="text-2xl md:text-3xl font-black mb-2">{formatCurrency(globalSummary.totalDanaBelumCair)}</h2>
                                <p className="text-[9px] md:text-[10px] text-emerald-100 flex items-center bg-black/20 w-fit px-2 py-1 rounded-md"><i className="fas fa-check-double text-emerald-400 mr-1.5"></i> Sudah Dicairkan: {formatCurrency(globalSummary.totalDanaCair)}</p>
                            </div>
                        </div>

                        <div className="flex border-b border-slate-700 space-x-2 md:space-x-6 overflow-x-auto scrollbar-hide shrink-0">
                            <button onClick={() => setActiveTab('gaji')} className={`shrink-0 pb-3 text-xs md:text-sm font-bold transition-colors ${activeTab === 'gaji' ? 'text-yellow-500 border-b-2 border-yellow-500' : 'text-slate-400 hover:text-slate-300'}`}>
                                <i className="fas fa-bullseye mr-1.5"></i> Gaji & Target Ops
                            </button>
                            <button onClick={() => setActiveTab('profit')} className={`shrink-0 pb-3 text-xs md:text-sm font-bold transition-colors ${activeTab === 'profit' ? 'text-emerald-500 border-b-2 border-emerald-500' : 'text-slate-400 hover:text-slate-300'}`}>
                                <i className="fas fa-chart-line mr-1.5"></i> Laporan Profit
                            </button>
                            <button onClick={() => setActiveTab('olshop')} className={`shrink-0 pb-3 text-xs md:text-sm font-bold transition-colors ${activeTab === 'olshop' ? 'text-[#e65c00] border-b-2 border-[#e65c00]' : 'text-slate-400 hover:text-slate-300'}`}>
                                <i className="fas fa-store mr-1.5"></i> Laporan Olshop
                            </button>
                            <button onClick={() => setActiveTab('kurir')} className={`shrink-0 pb-3 text-xs md:text-sm font-bold transition-colors ${activeTab === 'kurir' ? 'text-blue-500 border-b-2 border-blue-500' : 'text-slate-400 hover:text-slate-300'}`}>
                                <i className="fas fa-motorcycle mr-1.5"></i> Laporan Kurir
                            </button>
                        </div>

                        {activeTab === 'gaji' && (
                            <div className="animate-fade-in-down flex flex-col gap-4">
                                <div className="grid grid-cols-2 lg:grid-cols-5 gap-3 md:gap-4">
                                    <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-sm col-span-2 lg:col-span-1">
                                        <p className="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-1">Target Keseluruhan</p>
                                        <h3 className="text-xl md:text-2xl font-black text-white">{formatCurrency(targetPerusahaanGlobal)}</h3>
                                        <p className="text-[9px] text-slate-500 mt-1">Gaji Pokok + Biaya Ops</p>
                                    </div>
                                    <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-sm col-span-2 lg:col-span-1">
                                        <p className="text-[10px] text-emerald-500/70 font-bold tracking-widest uppercase mb-1">Total Pencapaian</p>
                                        <h3 className="text-xl md:text-2xl font-black text-emerald-400">{formatCurrency(globalSummary.totalProfitPerusahaan)}</h3>
                                        <p className="text-[9px] text-emerald-500/50 mt-1">Murni dari Ongkir Dasar</p>
                                    </div>
                                    <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-sm col-span-2 lg:col-span-1 flex flex-col justify-center">
                                        <p className="text-[10px] text-blue-400/80 font-bold tracking-widest uppercase mb-1">Rata-Rata Ongkir</p>
                                        <div className="flex items-end gap-2 md:gap-3">
                                            <h3 className="text-xl md:text-2xl font-black text-blue-400">{formatCurrency(rataRataOngkirGlobal)}</h3>
                                            <span className="text-[9px] text-blue-500/70 font-bold mb-1">/ Pkt</span>
                                        </div>
                                    </div>
                                    <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-sm col-span-1 flex flex-col justify-center">
                                        <div className="flex justify-between items-center mb-1">
                                            <p className="text-[10px] text-orange-400/80 font-bold tracking-widest uppercase">Target Pkt /Bulan</p>
                                        </div>
                                        <div className="flex items-end gap-2">
                                            <h3 className="text-xl md:text-2xl font-black text-orange-400">{estimasiTargetPaketBulan}</h3>
                                            <span className="text-[9px] text-orange-500/70 font-bold mb-1">Paket</span>
                                        </div>
                                    </div>
                                    <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-sm col-span-1 flex flex-col justify-center relative">
                                        <div className="flex justify-between items-center mb-1">
                                            <p className="text-[10px] text-purple-400/80 font-bold tracking-widest uppercase">Target Pkt /Hari</p>
                                            <div className="flex items-center bg-slate-900 border border-slate-600 rounded px-1.5">
                                                <input 
                                                    type="number" 
                                                    value={workDays} 
                                                    onChange={(e) => setWorkDays(e.target.value === '' ? '' : Number(e.target.value))}
                                                    className="w-8 md:w-10 bg-transparent text-right text-xs text-white font-bold outline-none" 
                                                    title="Ubah Asumsi Hari Kerja"
                                                />
                                                <span className="text-[9px] text-slate-500 ml-1">Hari</span>
                                            </div>
                                        </div>
                                        <div className="flex items-end gap-2">
                                            <h3 className="text-xl md:text-2xl font-black text-purple-400">{estimasiTargetPaketHari}</h3>
                                            <span className="text-[9px] text-purple-500/70 font-bold mb-1">Paket</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-[#1e293b] rounded-xl shadow-sm border border-slate-700 overflow-hidden">
                                    <div className="p-4 border-b border-slate-700 bg-slate-800/50 flex justify-between items-center">
                                        <div>
                                            <h3 className="font-bold text-slate-200 text-sm flex items-center">
                                                <i className="fas fa-calculator text-yellow-500 mr-2"></i> Pengaturan Biaya Operasional (Dinamis)
                                            </h3>
                                            <p className="text-[10px] text-slate-400 mt-1">Beban operasional akan dibagi <b>merata</b> ke {jumlahKurirAktif} kurir aktif.</p>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-[10px] text-slate-400 uppercase font-bold tracking-wider block mb-0.5">Total Operasional</span>
                                            <span className="text-yellow-400 font-black text-lg bg-yellow-500/10 px-3 py-1 rounded-lg border border-yellow-500/20">{formatCurrency(totalBiayaOperasional)}</span>
                                        </div>
                                    </div>
                                    <div className="p-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
                                        <div className="flex flex-col">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1"><i className="fas fa-home mr-1"></i> Sewa Kos</label>
                                            <input type="number" min="0" value={opsCosts.sewaKos} onChange={(e) => handleOpsChange('sewaKos', e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-yellow-500" />
                                        </div>
                                        <div className="flex flex-col">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1"><i className="fas fa-bolt mr-1"></i> Listrik</label>
                                            <input type="number" min="0" value={opsCosts.biayaListrik} onChange={(e) => handleOpsChange('biayaListrik', e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-yellow-500" />
                                        </div>
                                        <div className="flex flex-col">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1"><i className="fas fa-wifi mr-1"></i> Internet Wifi</label>
                                            <input type="number" min="0" value={opsCosts.biayaWifi} onChange={(e) => handleOpsChange('biayaWifi', e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-yellow-500" />
                                        </div>
                                        <div className="flex flex-col">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1"><i className="fas fa-gas-pump mr-1"></i> Akomodasi</label>
                                            <input type="number" min="0" value={opsCosts.akomodasi} onChange={(e) => handleOpsChange('akomodasi', e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-yellow-500" />
                                        </div>
                                        <div className="flex flex-col">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1"><i className="fas fa-user-tie mr-1"></i> Gaji Admin</label>
                                            <input type="number" min="0" value={opsCosts.gajiAdmin} onChange={(e) => handleOpsChange('gajiAdmin', e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-yellow-500" />
                                        </div>
                                        <div className="flex flex-col">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1"><i className="fas fa-ellipsis-h mr-1"></i> Lain-lain</label>
                                            <input type="number" min="0" value={opsCosts.lainLain} onChange={(e) => handleOpsChange('lainLain', e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-yellow-500" />
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-[#1e293b] rounded-xl shadow-sm border border-slate-700 overflow-hidden">
                                    <div className="overflow-x-auto custom-scrollbar">
                                        <div className="min-w-[1050px] flex flex-col">
                                            {kurirReport.length === 0 ? (
                                                <div className="p-8 text-center text-slate-500">Tidak ada data kurir di periode ini.</div>
                                            ) : (
                                                <div className="grid grid-cols-[200px_1fr_1fr_130px_130px_120px_120px] gap-4 px-4 py-3 text-[10px] text-slate-400 font-bold uppercase tracking-widest bg-[#151928] border-b border-slate-700 items-center">
                                                    <div>NAMA KURIR</div>
                                                    <div>RINCIAN TARGET BEBAN</div>
                                                    <div>PENCAPAIAN PROGRESS</div>
                                                    <div className="text-right">SISA TARGET</div>
                                                    <div className="text-right">RATA-RATA KURIR</div>
                                                    <div className="text-right text-yellow-400">SISA PAKET (EST)</div>
                                                    <div className="text-center">STATUS</div>
                                                </div>
                                            )}
                                            
                                            {[...kurirReport].map((kur, idx) => {
                                                const ks = kurirSettings[kur.name] || { gajiHarian: 150000, tglMasuk: '', tglAkhir: '' };
                                                const hKerja = (ks.tglMasuk && ks.tglAkhir) ? Math.max(1, Math.ceil((new Date(ks.tglAkhir) - new Date(ks.tglMasuk)) / (1000 * 60 * 60 * 24)) + 1) : 0;
                                                const targetGajiFinal = hKerja * (Number(ks.gajiHarian) || 0);
                                                
                                                const targetFinal = targetGajiFinal + bebanOpsPerKurir;
                                                const pencapaian = kur.profitPerusahaan; 
                                                const isTercapai = pencapaian >= targetFinal;
                                                const sisaTarget = isTercapai ? 0 : targetFinal - pencapaian;
                                                
                                                const avgOngkir = kur.totalSukses > 0 ? pencapaian / kur.totalSukses : 0;
                                                const estimasiPaket = (avgOngkir > 0 && sisaTarget > 0) ? Math.ceil(sisaTarget / avgOngkir) : 0;
                                                const progressPct = targetFinal > 0 ? Math.min((pencapaian / targetFinal) * 100, 100).toFixed(1) : 0;

                                                return (
                                                    <div key={idx} className="grid grid-cols-[200px_1fr_1fr_130px_130px_120px_120px] gap-4 px-4 py-5 border-b border-slate-700/50 hover:bg-slate-800/30 transition-colors items-center">
                                                        
                                                        <div className="flex flex-col">
                                                            <span className="font-bold text-slate-200 uppercase truncate text-sm" title={kur.name}>{kur.name}</span>
                                                            <span className="text-[10px] text-slate-500 mt-0.5">{kur.totalSukses} Pkt Selesai</span>
                                                        </div>

                                                        <div className="flex flex-col gap-1 pr-2 border-r border-slate-700/50">
                                                            {/* Gaji Harian Input */}
                                                            <div className="flex justify-between items-center text-[10px] mb-0.5">
                                                                <span className="text-slate-500">Gaji Harian</span>
                                                                <input 
                                                                    type="number"
