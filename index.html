                                                return (
                                                    <div key={idx} className="flex flex-col border-b border-slate-700/50 hover:bg-slate-800/30 transition-colors">
                                                        <div 
                                                            className="flex items-center justify-between p-3 md:p-4 cursor-pointer"
                                                            onClick={() => toggleKurir(kur.name)}
                                                        >
                                                            <div className="flex flex-col gap-1 w-[200px] md:w-[300px] shrink-0">
                                                                <div className="flex items-center gap-2.5">
                                                                    <div className={`w-5 h-5 rounded flex items-center justify-center transition-transform ${isExpanded ? 'bg-blue-500 text-white rotate-180' : 'bg-slate-700 text-slate-400'}`}><i className="fas fa-chevron-down text-[10px]"></i></div>
                                                                    <i className="fas fa-motorcycle text-blue-400/80"></i>
                                                                    <span className="font-bold text-slate-200 uppercase truncate text-xs md:text-sm">{kur.name}</span>
                                                                    <span className="text-[9px] bg-slate-700 text-slate-300 px-2 py-0.5 rounded shrink-0 font-bold">{kur.paketTerkait.length} Pkt</span>
                                                                </div>
                                                                <div className="flex gap-2 ml-7 mt-0.5">
                                                                    <span className="text-[9px] text-emerald-400 font-bold" title="Sukses"><i className="fas fa-check-circle mr-1"></i>{kur.totalSukses}</span>
                                                                    <span className="text-[9px] text-blue-400 font-bold" title="Proses"><i className="fas fa-truck mr-1"></i>{kur.totalProses}</span>
                                                                    <span className="text-[9px] text-orange-400 font-bold" title="Pending"><i className="fas fa-clock mr-1"></i>{kur.totalPending}</span>
                                                                    <span className="text-[9px] text-red-400 font-bold" title="Cancel"><i className="fas fa-times-circle mr-1"></i>{kur.totalCancel}</span>
                                                                </div>
                                                            </div>
                                                            <div className="flex-1 flex justify-end items-center gap-4 md:gap-5">
                                                                <div className="flex flex-col items-end justify-center min-w-[70px]"><span className="text-[8px] font-bold text-emerald-500/70 uppercase tracking-widest mb-0.5">UANG CASH</span><span className="text-xs md:text-sm font-black text-emerald-400">+{formatCurrency(kur.rincianCash)}</span></div>
                                                                <div className="flex flex-col items-end justify-center min-w-[70px]" title="Hak ongkir tambahan kurir dari paket CASH (Langsung dikantongi)"><span className="text-[8px] font-bold text-orange-400/80 uppercase tracking-widest mb-0.5">SIMPAN (CASH)</span><span className="text-xs md:text-sm font-black text-orange-400">-{formatCurrency(kur.tambahanOngkirCash)}</span></div>
                                                                <div className="flex flex-col items-end justify-center min-w-[70px]" title="Hak ongkir tambahan kurir dari paket TF (Dibayar kantor dengan memotong setoran)"><span className="text-[8px] font-bold text-purple-400/80 uppercase tracking-widest mb-0.5">POTONG (TF)</span><span className="text-xs md:text-sm font-black text-purple-400">-{formatCurrency(kur.tambahanOngkirTF)}</span></div>
                                                                <div className="flex flex-col items-end justify-center min-w-[80px] pl-2 border-l border-slate-700"><span className="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">WAJIB SETOR</span><span className={`text-[13px] md:text-[15px] font-black ${kur.setoran >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>{formatCurrency(kur.setoran)}</span></div>
                                                            </div>
                                                        </div>
                                                        {isExpanded && (
                                                            <div className="p-3 md:p-4 bg-[#0f172a]/60 animate-fade-in-down border-t border-slate-700/50">
                                                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-3 gap-3">
                                                                    <h4 className="text-slate-400 font-bold text-[10px] uppercase tracking-widest flex items-center"><i className="fas fa-boxes mr-2"></i>Rincian Bawaan: {kur.name}</h4>
                                                                    <div className="flex flex-wrap gap-1.5">
                                                                        {[{id:'semua', label:'Semua'}, {id:'sukses', label:'Sukses'}, {id:'proses', label:'Proses'}, {id:'pending', label:'Pending'}, {id:'cancel', label:'Cancel'}].map(f => (
                                                                            <button key={f.id} onClick={(e) => { e.stopPropagation(); setKurirFilters(prev => ({...prev, [kur.name]: f.id})); }}
                                                                                className={`px-2.5 py-1 rounded text-[9px] font-bold uppercase transition-colors border ${currentFilter === f.id ? 'bg-blue-500 text-white border-blue-500' : 'bg-slate-800 text-slate-400 border-slate-600 hover:bg-slate-700'}`}>
                                                                                {f.label}
                                                                            </button>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                                
                                                                {displayedPaket.length === 0 ? (
                                                                    <div className="text-center py-4 text-slate-500 text-xs italic">Tidak ada paket bawaan dengan filter tersebut.</div>
                                                                ) : (
                                                                    <div className="overflow-x-auto rounded-lg border border-slate-700/50">
                                                                        <table className="w-full text-left text-[9px] md:text-[10px]">
                                                                            <thead className="bg-slate-800 text-slate-400 border-b border-slate-700/50 uppercase tracking-wider">
                                                                                <tr>
                                                                                    <th className="py-2 px-3 font-bold">Resi & Tgl</th>
                                                                                    <th className="py-2 px-3 font-bold">Olshop & Penerima</th>
                                                                                    <th className="py-2 px-3 font-bold text-center">Status</th>
                                                                                    <th className="py-2 px-3 font-bold text-right">Tagihan & Mtd</th>
                                                                                    <th className="py-2 px-3 font-bold text-right">Brg (Hrg)</th>
                                                                                    <th className="py-2 px-3 font-bold text-right">Ongkir (Dsr+Tmb)</th>
                                                                                    <th className="py-2 px-3 font-bold text-center">Bukti</th>
                                                                                </tr>
                                                                            </thead>
                                                                            <tbody className="divide-y divide-slate-700/30 bg-[#1e293b]/50">
                                                                                {displayedPaket.map((pkg, pIdx) => {
                                                                                    const { hBarang, tagihan, oDasar, oTambahan } = getFinancials(pkg);
                                                                                    const isSukses = String(pkg.status).toLowerCase() === 'sukses';
                                                                                    let displayTgl = String(pkg.dateString || pkg.tanggal || '-');
                                                                                    if (displayTgl !== '-' && displayTgl.includes('T')) displayTgl = displayTgl.split('T')[0];

                                                                                    return (
                                                                                        <tr key={pIdx} className="hover:bg-slate-700/30 transition-colors">
                                                                                            <td className="py-2 px-3 whitespace-nowrap">
                                                                                                <div className="text-[#e65c00] font-mono font-bold bg-orange-900/20 px-1.5 py-0.5 rounded border border-orange-800/30 inline-block">{pkg.packageId}</div>
                                                                                                <div className="text-slate-500 mt-1 text-[8px]"><i className="far fa-calendar-alt mr-1"></i>{displayTgl}</div>
                                                                                            </td>
                                                                                            <td className="py-2 px-3">
                                                                                                <div className="text-slate-400 text-[8px] mb-0.5 truncate max-w-[120px] md:max-w-[200px]"><i className="fas fa-store mr-1"></i>{pkg.olshopName}</div>
                                                                                                <div className="text-slate-200 font-bold truncate max-w-[120px] md:max-w-[200px]" title={pkg.customerName}>{pkg.customerName}</div>
                                                                                                <div className="text-slate-500 text-[8px] mt-0.5 truncate max-w-[120px] md:max-w-[200px]"><i className="fas fa-map-marker-alt mr-1"></i>{pkg.address || '-'}</div>
                                                                                            </td>
                                                                                            <td className="py-2 px-3 text-center whitespace-nowrap">
                                                                                                <StatusBadgeAdmin status={pkg.status} />
                                                                                            </td>
                                                                                            <td className="py-2 px-3 text-right whitespace-nowrap">
                                                                                                <div className="text-slate-200 font-bold">{formatCurrency(tagihan)}</div>
                                                                                                <div className="text-slate-500 text-[8px] font-bold mt-0.5 uppercase">{pkg.metodeBayar || '-'}</div>
                                                                                            </td>
                                                                                            <td className="py-2 px-3 text-right whitespace-nowrap">
                                                                                                <div className={`font-bold ${isSukses ? 'text-emerald-400' : 'text-slate-400'}`}>{formatCurrency(hBarang)}</div>
                                                                                            </td>
                                                                                            <td className="py-2 px-3 text-right whitespace-nowrap">
                                                                                                <div className={`font-bold ${isSukses ? 'text-red-400' : 'text-slate-400'}`} title="Ongkir Dasar">{formatCurrency(oDasar)}</div>
                                                                                                <div className={`text-[8px] font-bold mt-0.5 ${isSukses ? 'text-orange-400' : 'text-slate-500'}`} title="Tambahan / Volume">+ {formatCurrency(oTambahan)}</div>
                                                                                            </td>
                                                                                            <td className="py-2 px-3 text-center whitespace-nowrap align-middle">
                                                                                                {pkg.fotoBukti ? (
                                                                                                    <div className="w-7 h-7 mx-auto rounded bg-slate-800 border border-slate-600 overflow-hidden cursor-pointer hover:opacity-80 transition-opacity" onClick={(e) => { e.stopPropagation(); setSelectedImage(`https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(pkg.fotoBukti)}`); }}>
                                                                                                        <img src={`https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(pkg.fotoBukti)}`} className="w-full h-full object-cover" />
                                                                                                    </div>
                                                                                                ) : (
                                                                                                    <div className="w-7 h-7 mx-auto rounded bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-500 text-[10px]"><i className="fas fa-image"></i></div>
                                                                                                )}
                                                                                            </td>
                                                                                        </tr>
                                                                                    );
                                                                                })}
                                                                            </tbody>
                                                                        </table>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* MODAL KONFIRMASI CAIRKAN */}
                    {isCairkanModalOpen && selectedOlshopToCairkan && (
                        <div className="fixed inset-0 z-[999] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 animate-fade-in-down">
                            <div className="bg-[#1e293b] rounded-2xl border border-slate-700 shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="p-5 border-b border-slate-700 bg-slate-800 flex justify-between items-center">
                                    <h3 className="font-bold text-white text-lg"><i className="fas fa-hand-holding-usd text-emerald-500 mr-2"></i> Konfirmasi Pencairan</h3>
                                    <button onClick={() => setIsCairkanModalOpen(false)} className="text-slate-400 hover:text-white transition-colors"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="p-5">
                                    <p className="text-slate-300 text-sm mb-4">Anda akan memproses pencairan dana untuk Olshop berikut:</p>
                                    <div className="bg-slate-900 rounded-xl p-4 border border-slate-700 mb-5">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-slate-400 text-xs font-bold uppercase tracking-wider">Nama Olshop</span>
                                            <span className="text-white font-bold">{selectedOlshopToCairkan.name}</span>
                                        </div>
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-slate-400 text-xs font-bold uppercase tracking-wider">Jumlah Paket</span>
                                            <span className="text-white font-bold bg-slate-700 px-2 py-0.5 rounded text-xs">{selectedOlshopToCairkan.paketBelumCairIds.length} Pkt</span>
                                        </div>
                                        <div className="flex justify-between items-center border-t border-slate-700 pt-3 mt-3">
                                            <span className="text-emerald-500/70 text-xs font-bold uppercase tracking-wider">Total Dana Cair</span>
                                            <span className="text-emerald-400 font-black text-lg">{formatCurrency(selectedOlshopToCairkan.nominalBelumCair)}</span>
                                        </div>
                                    </div>

                                    {/* DAFTAR RINCIAN PAKET BELUM CAIR */}
                                    <div className="mb-5">
                                        <h4 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2"><i className="fas fa-list-ul mr-1.5"></i> Rincian Paket Belum Cair</h4>
                                        <div className="max-h-40 overflow-y-auto pr-1 space-y-2 custom-scrollbar">
                                            {selectedOlshopToCairkan.paketBelumCairDetails.map((pDetail, idx) => {
                                                let displayTgl = String(pDetail.dateString || pDetail.tanggal || '-');
                                                if (displayTgl !== '-' && displayTgl.includes('T')) displayTgl = displayTgl.split('T')[0];
                                                
                                                const { hBarang, oTotal } = getFinancials(pDetail);
                                                const mtd = String(pDetail.metodeBayar).trim().toUpperCase();
                                                let pNominal = 0;
                                                if (mtd === 'TF OLSHOP') pNominal = -oTotal;
                                                else if (mtd === 'CASH' || mtd === 'TF KANTOR' || mtd === 'COD') pNominal = hBarang;

                                                return (
                                                    <div key={idx} className="bg-slate-800 border border-slate-700 rounded-lg p-2.5 flex justify-between items-center">
                                                        <div className="flex flex-col">
                                                            <span className="text-xs font-bold text-slate-200">{pDetail.customerName}</span>
                                                            <div className="flex items-center gap-2 mt-0.5">
                                                                <span className="text-[9px] font-mono text-emerald-400 bg-emerald-900/20 border border-emerald-800/30 px-1 rounded">{pDetail.packageId}</span>
                                                                <span className="text-[9px] text-slate-500"><i className="far fa-calendar-alt mr-1"></i>{displayTgl}</span>
                                                            </div>
                                                        </div>
                                                        <span className={`text-xs font-black ${pNominal >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                                            {formatCurrency(pNominal)}
                                                        </span>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>

                                    <div className="flex gap-3">
                                        <button onClick={() => setIsCairkanModalOpen(false)} disabled={isProcessingCair} className="flex-1 py-2.5 rounded-xl font-bold text-slate-300 bg-slate-700 hover:bg-slate-600 transition-colors">Batal</button>
                                        <button onClick={handleProsesCairkan} disabled={isProcessingCair} className="flex-1 py-2.5 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-500 transition-colors flex justify-center items-center shadow-lg shadow-emerald-900/50">
                                            {isProcessingCair ? <><i className="fas fa-spinner fa-spin mr-2"></i> Memproses...</> : 'Ya, Cairkan Sekarang'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL EDIT DATA PAKET (TERBARU DENGAN DROP-DOWN MURNI & SCROLL FIX) */}
                    {isEditModalOpen && (
                        <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 animate-fade-in-down">
                            <div className="bg-[#1e293b] rounded-2xl border border-slate-700 shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[95vh]">
                                <div className="p-4 md:p-5 border-b border-slate-700 bg-slate-800 flex justify-between items-center shrink-0">
                                    <h3 className="font-bold text-white flex items-center"><i className="fas fa-edit text-blue-500 mr-2"></i> Edit Data Paket</h3>
                                    <button onClick={() => setIsEditModalOpen(false)} className="text-slate-400 hover:text-white transition-colors"><i className="fas fa-times text-xl"></i></button>
                                </div>
                                
                                <form onSubmit={handleEditSubmit} className="p-4 md:p-5 space-y-4 overflow-y-auto custom-scrollbar flex-1">
                                    <div className="bg-slate-900 p-3 rounded-lg border border-slate-700 text-center mb-2">
                                        <span className="text-xs text-slate-400 font-bold uppercase tracking-widest">Resi Pengiriman</span>
                                        <h2 className="text-lg font-black text-blue-400 font-mono tracking-widest">{editModal.packageId}</h2>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {/* NAMA OLSHOP */}
                                        <div className="flex flex-col">
                                            <label className="text-[10px] text-slate-400 font-bold uppercase mb-1">Nama Toko (Olshop)</label>
                                            <select 
                                                value={editModal.olshopName}
                                                onChange={(e) => setEditModal({...editModal, olshopName: e.target.value})}
                                                className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-blue-500 cursor-pointer"
                                            >
                                                <option value="">-- Pilih Olshop --</option>
                                                {!masterOlshops.some(o => o.nama === editModal.olshopName) && editModal.olshopName && (
                                                    <option value={editModal.olshopName}>{editModal.olshopName}</option>
                                                )}
                                                {masterOlshops.map((o, i) => <option key={i} value={o.nama}>{o.nama}</option>)}
                                            </select>
                                        </div>

                                        {/* KURIR PENGANTAR */}
                                        <div className="flex flex-col">
                                            <label className="text-[10px] text-slate-400 font-bold uppercase mb-1">Email / ID Kurir</label>
                                            <select 
                                                value={editModal.kurirId}
                                                onChange={(e) => setEditModal({...editModal, kurirId: e.target.value})}
                                                className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-blue-500 cursor-pointer"
                                            >
                                                <option value="">-- Pilih Kurir --</option>
                                                {!masterKurirs.some(k => k.id === editModal.kurirId) && editModal.kurirId && (
                                                    <option value={editModal.kurirId}>{editModal.kurirId}</option>
                                                )}
                                                {masterKurirs.map((k, i) => <option key={i} value={k.id}>{k.nama}</option>)}
                                            </select>
                                        </div>

                                        {/* STATUS PENGIRIMAN */}
                                        <div className="flex flex-col">
                                            <label className="text-[10px] text-slate-400 font-bold uppercase mb-1">Status Pengiriman</label>
                                            <select 
                                                value={editModal.status}
                                                onChange={(e) => setEditModal({...editModal, status: e.target.value})}
                                                className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-blue-500 cursor-pointer"
                                            >
                                                <option value="SUKSES">Sukses</option>
                                                <option value="SIAP_ANTAR">Proses (Siap Antar)</option>
                                                <option value="PENDING">Pending</option>
                                                <option value="CANCEL">Cancel / Batal</option>
                                            </select>
                                        </div>

                                        {/* METODE BAYAR */}
                                        <div className="flex flex-col">
                                            <label className="text-[10px] text-slate-400 font-bold uppercase mb-1">Metode Bayar</label>
                                            <select 
                                                value={editModal.metodeBayar}
                                                onChange={(e) => setEditModal({...editModal, metodeBayar: e.target.value})}
                                                className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-blue-500 cursor-pointer"
                                            >
                                                <option value="">-- KOSONG / BELUM ADA --</option>
                                                <option value="CASH">CASH</option>
                                                <option value="TF OLSHOP">TF OLSHOP</option>
                                                <option value="TF KANTOR">TF KANTOR</option>
                                                <option value="COD">COD</option>
                                            </select>
                                        </div>

                                        {/* HARGA BARANG */}
                                        <div className="flex flex-col">
                                            <label className="text-[10px] text-slate-400 font-bold uppercase mb-1">Harga Barang</label>
                                            <input 
                                                type="number"
                                                value={editModal.hargaPaket}
                                                onChange={(e) => setEditModal({...editModal, hargaPaket: e.target.value})}
                                                className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-blue-500"
                                            />
                                        </div>

                                        {/* KODE ONGKIR TRF */}
                                        <div className="flex flex-col">
                                            <label className="text-[10px] text-slate-400 font-bold uppercase mb-1">Kode Ongkir (TRF/ZONA)</label>
                                            <select 
                                                value={editModal.ongkirKode}
                                                onChange={(e) => handleOngkirKodeChange(e.target.value)}
                                                className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-blue-500 cursor-pointer"
                                            >
                                                <option value="">-- Pilih TRF / ZONA --</option>
                                                {!masterZonas.some(z => z.id === editModal.ongkirKode) && editModal.ongkirKode && (
                                                    <option value={editModal.ongkirKode}>{editModal.ongkirKode}</option>
                                                )}
                                                {masterZonas.map((z, i) => <option key={i} value={z.id}>{z.id} - {z.nama} (Rp {formatCurrency(z.harga)})</option>)}
                                            </select>
                                            {editModal.ongkirDasar > 0 && <span className="text-[9px] text-emerald-400 mt-1 font-bold">Terbaca: Rp {formatCurrency(editModal.ongkirDasar)}</span>}
                                        </div>

                                        {/* TAMBAHAN ONGKIR */}
                                        <div className="flex flex-col">
                                            <label className="text-[10px] text-slate-400 font-bold uppercase mb-1">Tambahan Ongkir (Vol)</label>
                                            <input 
                                                type="number"
                                                value={editModal.tambahanOngkir}
                                                onChange={(e) => setEditModal({...editModal, tambahanOngkir: e.target.value})}
                                                className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-blue-500"
                                            />
                                        </div>

                                        {/* TANGGAL */}
                                        <div className="flex flex-col">
                                            <label className="text-[10px] text-slate-400 font-bold uppercase mb-1">Ubah Tanggal</label>
                                            <input 
                                                type="date"
                                                value={editModal.tanggal}
                                                onChange={(e) => setEditModal({...editModal, tanggal: e.target.value})}
                                                className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-bold outline-none focus:border-blue-500"
                                            />
                                        </div>
                                    </div>

                                    <div className="bg-blue-900/20 border border-blue-500/30 p-3 rounded-xl mt-2 text-center shrink-0">
                                        <span className="text-[10px] text-blue-400 font-bold uppercase tracking-widest mb-1 block">Estimasi Tagihan Resi</span>
                                        <h3 className="text-2xl font-black text-white">{formatCurrency(Number(editModal.hargaPaket) + Number(editModal.ongkirDasar) + Number(editModal.tambahanOngkir))}</h3>
                                    </div>

                                    <div className="flex gap-3 pt-4 border-t border-slate-700 shrink-0">
                                        <button type="button" onClick={() => setIsEditModalOpen(false)} disabled={isProcessingEdit} className="flex-1 py-3 rounded-xl font-bold text-slate-300 bg-slate-700 hover:bg-slate-600 transition-colors">Batal</button>
                                        <button type="submit" disabled={isProcessingEdit} className="flex-1 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500 transition-colors flex justify-center items-center shadow-lg shadow-blue-900/50">
                                            {isProcessingEdit ? <><i className="fas fa-spinner fa-spin mr-2"></i> Menyimpan...</> : <><i className="fas fa-save mr-2"></i> Simpan Edit</>}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL FOTO MEMBESAR */}
                    {selectedImage && (
                        <div 
                            className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 transition-opacity"
                            onClick={() => setSelectedImage(null)}
                        >
                            <div className="relative w-full max-w-lg md:max-w-2xl flex flex-col items-center transform transition-all scale-100" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setSelectedImage(null)} className="absolute -top-12 right-0 text-white bg-red-500/80 hover:bg-red-500 w-10 h-10 rounded-full flex items-center justify-center transition-colors shadow-lg border border-white/20">
                                    <i className="fas fa-times text-xl"></i>
                                </button>
                                <img src={selectedImage} alt="Foto Paket Membesar" className="w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border-4 border-white/10 bg-black/50" />
                                <p className="text-white font-black mt-4 tracking-widest text-sm uppercase flex items-center bg-black/50 px-4 py-2 rounded-full border border-white/10">
                                    <i className="fas fa-camera mr-2 text-blue-400"></i> FOTO PAKET
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
