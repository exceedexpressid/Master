                                                                                                                                            <img src={`https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(pkg.fotoBukti)}`} className="w-full h-full object-cover" />
                                                                                                                                            <div className="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><i className="fas fa-search-plus text-white text-xs"></i></div>
                                                                                                                                        </div>
                                                                                                                                    ) : (
                                                                                                                                        <div className="w-12 h-12 md:w-14 md:h-14 rounded-lg bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-500"><i className="fas fa-image"></i></div>
                                                                                                                                    )}
                                                                                                                                    {String(pkg.status).toLowerCase() === 'sukses' && (
                                                                                                                                        <span className={`mt-1.5 text-[8px] font-bold px-1.5 py-0.5 rounded border ${isCair ? 'bg-emerald-900/30 text-emerald-400 border-emerald-800/50' : 'bg-orange-900/30 text-orange-400 border-orange-800/50'}`}>
                                                                                                                                            {isCair ? 'TELAH CAIR' : 'BELUM CAIR'}
                                                                                                                                        </span>
                                                                                                                                    )}
                                                                                                                                </div>
                                                                                                                            </div>
                                                                                                                            
                                                                                                                            <div className="space-y-1.5 text-[10px] md:text-xs mb-3">
                                                                                                                                <div className="flex items-start">
                                                                                                                                    <i className="fas fa-map-marker-alt text-slate-500 mt-0.5 mr-2 w-3 text-center"></i>
                                                                                                                                    <span className="text-slate-300 line-clamp-2">{pkg.address || '-'}</span>
                                                                                                                                </div>
                                                                                                                            </div>
                                                                                                                            
                                                                                                                            <div className="mt-auto pt-2 border-t border-slate-700/50 grid grid-cols-2 gap-2 text-[10px] md:text-xs">
                                                                                                                                <div>
                                                                                                                                    <div className="text-slate-500">Metode Bayar</div>
                                                                                                                                    <div className="font-bold text-slate-200">{pkg.metodeBayar || '-'}</div>
                                                                                                                                </div>
                                                                                                                                <div className="text-right">
                                                                                                                                    <div className="text-slate-500">Total Tagihan</div>
                                                                                                                                    <div className="font-bold text-slate-100">{formatCurrency(tagihan)}</div>
                                                                                                                                </div>
                                                                                                                                <div>
                                                                                                                                    <div className="text-slate-500">Harga Paket</div>
                                                                                                                                    <div className={`font-bold ${String(pkg.status).toLowerCase()==='sukses'?'text-emerald-400':'text-slate-400'}`}>{formatCurrency(hBarang)}</div>
                                                                                                                                </div>
                                                                                                                                <div className="text-right">
                                                                                                                                    <div className="text-slate-500">Ongkir</div>
                                                                                                                                    <div className={`font-bold ${String(pkg.status).toLowerCase()==='sukses'?'text-red-400':'text-slate-400'}`}>{formatCurrency(ongkir)}</div>
                                                                                                                                </div>
                                                                                                                            </div>
                                                                                                                        </div>
                                                                                                                    );
                                                                                                                })}
                                                                                                            </div>
                                                                                                        </div>
                                                                                                    )}
                                                                                                </div>
                                                                                            );
                                                                                        });
                                                                                    })()}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            )}
                                                        </React.Fragment>
                                                    );
                                                })
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* TAMPILAN TAB 3: LAPORAN PROFIT */}
                        {activeTab === 'profit' && (
                            <div className="bg-[#1e293b] rounded-xl shadow-sm border border-slate-700 overflow-hidden">
                                <div className="p-3 md:p-4 border-b border-slate-700 bg-slate-800/50 flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                                    <div>
                                        <h3 className="font-bold text-slate-200 text-xs md:text-sm">Rincian Profit <span className="text-[10px] text-slate-400 font-normal ml-1">(Klik baris untuk rincian)</span></h3>
                                    </div>
                                    <div className="flex flex-col md:flex-row items-center gap-3 w-full md:w-auto">
                                        <div className="flex bg-slate-900 rounded-lg p-1 border border-slate-700 w-full md:w-auto">
                                            <button 
                                                onClick={() => setProfitViewBy('olshop')} 
                                                className={`flex-1 px-3 md:px-4 py-1.5 md:py-2 rounded-md text-[10px] md:text-xs font-bold transition-colors ${profitViewBy === 'olshop' ? 'bg-emerald-600 text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'}`}
                                            >
                                                Per Olshop
                                            </button>
                                            <button 
                                                onClick={() => setProfitViewBy('kurir')} 
                                                className={`flex-1 px-3 md:px-4 py-1.5 md:py-2 rounded-md text-[10px] md:text-xs font-bold transition-colors ${profitViewBy === 'kurir' ? 'bg-emerald-600 text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'}`}
                                            >
                                                Per Kurir
                                            </button>
                                        </div>
                                        <span className="text-[10px] md:text-xs font-bold bg-emerald-900/50 text-emerald-400 px-3 py-2 rounded-lg border border-emerald-800 w-full md:w-auto text-center whitespace-nowrap shadow-inner">
                                            Total Keseluruhan: {formatCurrency(globalSummary.totalProfit)}
                                        </span>
                                    </div>
                                </div>
                                
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse text-xs md:text-sm min-w-[500px]">
                                        <thead>
                                            <tr className="bg-slate-800 border-b border-slate-700 text-slate-400 uppercase tracking-wider text-[9px] md:text-[10px]">
                                                <th className="p-3 font-bold w-1/2">{profitViewBy === 'olshop' ? 'Nama Olshop (Penyumbang Profit)' : 'Nama Kurir (Penghasil Profit)'}</th>
                                                <th className="p-3 font-bold text-center">Pkt Sukses</th>
                                                <th className="p-3 font-bold text-right text-emerald-400">Total Profit Dihasilkan</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-700/50">
                                            {(() => {
                                                const reportData = profitViewBy === 'olshop' ? olshopReport : kurirReport;
                                                const filteredData = reportData.filter(item => item.profit > 0).sort((a,b) => b.profit - a.profit);
                                                
                                                if (filteredData.length === 0) return <tr><td colSpan="3" className="p-8 text-center text-slate-500">Tidak ada profit yang dihasilkan di periode ini.</td></tr>;

                                                return filteredData.map((item, idx) => {
                                                    const uniqueId = profitViewBy + '_' + item.name;
                                                    const isExpanded = expandedProfitItems.includes(uniqueId);
                                                    const suksesPackages = item.paketTerkait.filter(p => String(p.status).toLowerCase() === 'sukses');

                                                    return (
                                                        <React.Fragment key={idx}>
                                                            <tr 
                                                                onClick={() => toggleProfitItem(uniqueId)} 
                                                                className={`hover:bg-slate-800/50 transition-colors cursor-pointer group ${isExpanded ? 'bg-slate-800/30' : ''}`}
                                                            >
                                                                <td className="p-3 font-bold text-slate-200 flex items-center whitespace-nowrap">
                                                                    <div className={`w-5 h-5 rounded-full flex items-center justify-center mr-3 transition-colors flex-shrink-0 ${isExpanded ? 'bg-emerald-500 text-white' : 'bg-slate-700 text-slate-400 group-hover:text-emerald-500'}`}>
                                                                        <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'} text-[10px]`}></i>
                                                                    </div>
                                                                    <i className={`fas ${profitViewBy === 'olshop' ? 'fa-store' : 'fa-motorcycle'} text-slate-500 mr-2 text-[10px]`}></i>
                                                                    <span className="truncate text-sm">{item.name}</span>
                                                                </td>
                                                                <td className="p-3 text-center">
                                                                    <span className="bg-emerald-900/40 text-emerald-400 border border-emerald-800 px-2.5 py-1 rounded-md text-[10px] font-bold">
                                                                        <i className="fas fa-check-circle mr-1.5"></i>{suksesPackages.length} Paket
                                                                    </span>
                                                                </td>
                                                                <td className="p-3 text-right font-black text-emerald-400 text-sm whitespace-nowrap">+{formatCurrency(item.profit)}</td>
                                                            </tr>

                                                            {isExpanded && (
                                                                <tr>
                                                                    <td colSpan="3" className="p-0 bg-[#0f172a]/80">
                                                                        <div className="p-3 md:p-4 border-b border-slate-700 animate-fade-in-down">
                                                                            <div className="flex items-center mb-4 border-b border-slate-700/50 pb-3">
                                                                                <h4 className="text-slate-400 font-bold text-[10px] uppercase tracking-widest flex items-center"><i className="fas fa-boxes mr-2"></i>Rincian Profit Resi: {item.name}</h4>
                                                                            </div>
                                                                            
                                                                            <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-3">
                                                                                {suksesPackages.map((pkg, pIdx) => {
                                                                                    const hBarang = Number(pkg.hargaPaket) || 0;
                                                                                    const tagihan = Number(pkg.totalTagihan) || 0;
                                                                                    const ongkir = pkg.ongkirReal !== undefined ? Number(pkg.ongkirReal) : ((tagihan - hBarang > 0) ? (tagihan - hBarang) : 0);
                                                                                    
                                                                                    let displayKurir = String(pkg.kurirId || 'Tanpa Kurir').split('@')[0];
                                                                                    let displayTgl = String(pkg.dateString || pkg.tanggal || '-');
                                                                                    if (displayTgl !== '-' && displayTgl.includes('T')) displayTgl = displayTgl.split('T')[0];

                                                                                    return (
                                                                                        <div key={pIdx} className="bg-[#1e293b] border border-slate-600/50 rounded-xl p-3 flex flex-col relative shadow-sm hover:border-emerald-700/50 transition-colors group">
                                                                                            <div className="flex justify-between items-start border-b border-slate-700/50 pb-2 mb-2">
                                                                                                <div className="flex-1 pr-2">
                                                                                                    <div className="flex items-center space-x-2">
                                                                                                        <div className="text-[#e65c00] font-mono text-[10px] md:text-xs font-bold bg-orange-900/20 px-1.5 py-0.5 rounded border border-orange-800/30 inline-block">{pkg.packageId}</div>
                                                                                                        <span className="text-slate-500 text-[9px]"><i className="far fa-calendar-alt mr-1"></i>{displayTgl}</span>
                                                                                                    </div>
                                                                                                    <div className="text-slate-200 font-bold text-xs md:text-sm mt-1.5 truncate">{pkg.customerName}</div>
                                                                                                    
                                                                                                    {profitViewBy === 'olshop' ? (
                                                                                                        <div className="text-slate-400 text-[10px] md:text-xs flex items-center mt-1"><i className="fas fa-motorcycle mr-1.5 text-slate-500 w-3 text-center"></i> Kurir: <span className="font-medium text-slate-300 ml-1">{displayKurir}</span></div>
                                                                                                    ) : (
                                                                                                        <div className="text-slate-400 text-[10px] md:text-xs flex items-center mt-1"><i className="fas fa-store mr-1.5 text-slate-500 w-3 text-center"></i> Olshop: <span className="font-medium text-slate-300 ml-1">{pkg.olshopName}</span></div>
                                                                                                    )}
                                                                                                </div>
                                                                                                
                                                                                                <div className="flex-shrink-0 flex flex-col items-end justify-center h-full bg-emerald-900/20 p-2 rounded-lg border border-emerald-800/30">
                                                                                                    <div className="text-[9px] text-emerald-500 mb-0.5 uppercase font-bold tracking-widest">Ongkir / Profit</div>
                                                                                                    <div className="font-black text-emerald-400 text-sm md:text-base">+{formatCurrency(ongkir)}</div>
                                                                                                </div>
                                                                                            </div>
                                                                                            
                                                                                            <div className="mt-auto pt-1 flex justify-between items-center text-[10px] md:text-xs text-slate-400">
                                                                                                <span>Metode: <span className="font-bold text-slate-200">{pkg.metodeBayar || '-'}</span></span>
                                                                                                <span>Tagihan Total: <span className="font-bold text-slate-200">{formatCurrency(tagihan)}</span></span>
                                                                                            </div>
                                                                                        </div>
                                                                                    );
                                                                                })}
                                                                            </div>
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            )}
                                                        </React.Fragment>
                                                    );
                                                });
                                            })()}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* MODAL FOTO MEMBESAR */}
                    {selectedImage && (
                        <div 
                            className="fixed inset-0 z-[999] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 transition-opacity"
                            onClick={() => setSelectedImage(null)}
                        >
                            <div className="relative w-full max-w-lg md:max-w-2xl flex flex-col items-center" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setSelectedImage(null)} className="absolute -top-14 right-0 text-white bg-red-500/80 hover:bg-red-500 w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center transition-colors shadow-xl border border-white/20">
                                    <i className="fas fa-times text-xl"></i>
                                </button>
                                <img src={selectedImage} alt="Foto Paket Membesar" className="w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl border-4 border-white/10 bg-slate-900" />
                            </div>
                        </div>
                    )}

                    {/* MODAL CAIRKAN */}
                    {isCairkanModalOpen && selectedOlshopToCairkan && (
                        <div className="fixed inset-0 z-[999] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 animate-fade-in-down">
                            <div className="bg-[#1e293b] rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md overflow-hidden">
                                <div className="p-4 md:p-5 border-b border-slate-700 bg-slate-800/50">
                                    <h3 className="text-sm md:text-base font-black text-white flex items-center"><i className="fas fa-money-check-alt text-emerald-500 mr-2"></i> Konfirmasi Pencairan</h3>
                                </div>
                                <div className="p-4 md:p-5 space-y-4">
                                    <p className="text-slate-300 text-xs md:text-sm">Anda akan mencairkan dana dan mengubah status di Spreadsheet untuk Olshop:</p>
                                    <div className="bg-slate-800 p-3 md:p-4 rounded-xl border border-slate-700">
                                        <div className="font-bold text-base md:text-lg text-white mb-1">{selectedOlshopToCairkan.name}</div>
                                        <div className="flex justify-between items-center text-xs md:text-sm">
                                            <span className="text-slate-400">Total Resi Diproses:</span>
                                            <span className="font-bold text-slate-200">{selectedOlshopToCairkan.paketBelumCairIds.length} Paket</span>
                                        </div>
                                        <div className="flex justify-between items-center text-xs md:text-sm mt-2 pt-2 border-t border-slate-700">
                                            <span className="text-slate-400">Total Nominal Cair:</span>
                                            <span className={`font-black text-sm md:text-base ${selectedOlshopToCairkan.nominalBelumCair >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                                {formatCurrency(selectedOlshopToCairkan.nominalBelumCair)}
                                            </span>
                                        </div>
                                    </div>
                                    <p className="text-[10px] md:text-xs text-yellow-400/90 bg-yellow-900/20 p-2.5 md:p-3 rounded-lg border border-yellow-700/30 flex">
                                        <i className="fas fa-exclamation-triangle mr-2 mt-0.5"></i>
                                        <span>Tindakan ini akan otomatis mengubah Status Pencairan <b>{selectedOlshopToCairkan.paketBelumCairIds.length} paket</b> menjadi <b>"Cair"</b> di Google Sheets.</span>
                                    </p>
                                </div>
                                <div className="p-3 md:p-4 border-t border-slate-700 bg-slate-800/50 flex space-x-3">
                                    <button 
                                        onClick={() => setIsCairkanModalOpen(false)}
                                        disabled={isProcessingCair}
                                        className="flex-1 px-4 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-bold text-slate-300 bg-slate-700 hover:bg-slate-600 transition-colors"
                                    >
                                        Batal
                                    </button>
                                    <button 
                                        onClick={handleProsesCairkan}
                                        disabled={isProcessingCair}
                                        className="flex-1 px-4 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-bold text-white bg-emerald-600 hover:bg-emerald-500 transition-colors flex items-center justify-center shadow-lg shadow-emerald-900/50"
                                    >
                                        {isProcessingCair ? <><i className="fas fa-spinner fa-spin mr-2"></i> Memproses...</> : <><i className="fas fa-check mr-2"></i> Ya, Cairkan</>}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
